<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
  <!-- Claw/Robot icon (simplified) -->
  <g transform="translate(50, 50)">
    <!-- Main body -->
    <rect x="-15" y="-20" width="30" height="35" rx="4" fill="white" opacity="0.95"/>
    <!-- Head -->
    <circle cx="0" cy="-20" r="10" fill="white" opacity="0.95"/>
    <!-- Left claw -->
    <path d="M -12,-8 Q -20,-10 -24,-5" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.95"/>
    <!-- Right claw -->
    <path d="M 12,-8 Q 20,-10 24,-5" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.95"/>
    <!-- Eyes -->
    <circle cx="-4" cy="-22" r="1.5" fill="#2563eb"/>
    <circle cx="4" cy="-22" r="1.5" fill="#2563eb"/>
  </g>
</svg>