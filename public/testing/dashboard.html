<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Command Center v1.0</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; background-image: radial-gradient(circle at 20% 50%, rgba(33, 150, 243, 0.1), transparent), radial-gradient(circle at 80% 80%, rgba(156, 39, 176, 0.05), transparent); color: #e0e0e0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 30px; }
    h1 { color: #2196f3; font-size: 2.5em; margin-bottom: 10px; }
    .subtitle { color: #90caf9; font-size: 1.1em; }
    .tabs { display: flex; gap: 10px; margin: 30px 0; border-bottom: 2px solid #333; }
    .tab-btn { padding: 10px 20px; background: none; border: none; color: #90caf9; cursor: pointer; font-size: 1em; border-bottom: 3px solid transparent; transition: all 0.3s; }
    .tab-btn.active { color: #2196f3; border-bottom-color: #2196f3; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    table { width: 100%; border-collapse: collapse; background: rgba(20, 20, 30, 0.8); border: 1px solid #333; border-radius: 4px; margin: 20px 0; }
    thead { background: rgba(33, 150, 243, 0.1); }
    th { padding: 12px; text-align: left; color: #2196f3; font-weight: 600; border-bottom: 2px solid #333; }
    td { padding: 10px 12px; border-bottom: 1px solid #333; }
    tr:hover { background: rgba(33, 150, 243, 0.05); }
    .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: 600; }
    .status-active { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .status-idle { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; }
    .status-success { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .status-error { background: rgba(244, 67, 54, 0.2); color: #f44336; }
    .loading { text-align: center; color: #90caf9; padding: 20px; }
    .last-updated { text-align: right; color: #666; font-size: 0.9em; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎯📊 Agent Command Center v1.0.6 (Real-time Google Sheets)</h1>
      <p class="subtitle">Live agent and cron job monitoring from Google Sheets webhook</p>
    </header>
    <main id="main"></main>
  </div>
  <script>
    const WEBHOOK_URL = '/api/webhook';
    const SPREADSHEET_ID = '1NyQHZXT-QkA7EX8LX3B4CAyWfzrRoAb9nbTMJmStGyk';
    
    let isLoggedIn = false;
    let agents = [];
    let cronJobs = [];
    let activeTab = localStorage.getItem('dashboardTab') || 'agents';
    const APP_VERSION = 'v1.0.6';
    let lastUpdated = 'Never';

    function switchTab(tab) {
      activeTab = tab;
      localStorage.setItem('dashboardTab', tab);
      showDashboard();
    }

    async function fetchDataFromWebhook() {
      try {
        console.log('[WEBHOOK] Fetching from', WEBHOOK_URL);
        const response = await fetch(WEBHOOK_URL);
        const result = await response.json();
        
        console.log('[WEBHOOK] Response:', result);
        
        if (result.success && result.data) {
          console.log('[WEBHOOK] Got real data from Google Sheets');
          
          // Parse agents from webhook
          if (result.data.agents && Array.isArray(result.data.agents)) {
            agents = result.data.agents.slice(1).map(row => {
              if (!row || !row.values) return null;
              const vals = row.values.map(v => v.formattedValue || '');
              return { 
                id: vals[0], 
                name: vals[1], 
                icon: vals[2], 
                version: vals[3], 
                status: vals[4], 
                nextSchedule: vals[5], 
                lastRun: vals[6], 
                description: vals[7] 
              };
            }).filter(a => a && a.name);
            console.log('[WEBHOOK] Parsed agents:', agents);
          }
          
          // Parse jobs from webhook
          if (result.data.jobs && Array.isArray(result.data.jobs)) {
            cronJobs = result.data.jobs.slice(1).map(row => {
              if (!row || !row.values) return null;
              const vals = row.values.map(v => v.formattedValue || '');
              return { 
                id: vals[0], 
                name: vals[1], 
                icon: vals[2], 
                schedule: vals[3], 
                nextRun: vals[4], 
                lastRun: vals[5], 
                duration: vals[6], 
                status: vals[7] 
              };
            }).filter(j => j && j.name);
            console.log('[WEBHOOK] Parsed jobs:', cronJobs);
          }
          
          lastUpdated = new Date().toLocaleTimeString();
          showDashboard();
          return;
        }
      } catch (err) {
        console.error('[WEBHOOK] Error:', err.message);
      }
      
      // Fallback to mock data
      console.log('[FALLBACK] Using mock data');
      agents = getMockAgents();
      cronJobs = getMockCronJobs();
      showDashboard();
    }

    function getMockAgents() {
      return [
        { id: '1', name: 'Staff Sergeant Agent', icon: '⚡', version: 'v2.0', status: 'active', nextSchedule: '2026-03-31T09:00:00Z', lastRun: '2026-03-27T08:00:00Z', description: 'Personal performance coach' },
        { id: '2', name: 'TEST Sergeant First Class', icon: '🎖️', version: 'v2.1', status: 'active', nextSchedule: '2026-03-31T10:00:00Z', lastRun: '2026-03-26T10:00:00Z', description: 'Executive analytics' },
        { id: '3', name: 'Cami Agent (Weekly)', icon: '📅', version: 'v1.0', status: 'active', nextSchedule: '2026-03-29T18:00:00Z', lastRun: '2026-03-22T18:00:00Z', description: 'Calendar briefing' },
        { id: '4', name: 'Cami Agent (Daily)', icon: '📅', version: 'v1.0', status: 'active', nextSchedule: '2026-03-28T18:00:00Z', lastRun: '2026-03-27T08:00:00Z', description: 'Daily monitoring' },
        { id: '5', name: 'Research Scout', icon: '🔍', version: 'Daily', status: 'active', nextSchedule: '2026-03-27T16:00:00Z', lastRun: '2026-03-27T13:00:00Z', description: 'Web research' },
        { id: '6', name: 'Bouncer Agent', icon: '🚪', version: 'Daily', status: 'active', nextSchedule: '2026-03-28T01:00:00Z', lastRun: '2026-03-27T01:00:00Z', description: 'Security audit' },
        { id: '7', name: 'Job Application Agent', icon: '💼', version: 'v2.0', status: 'idle', nextSchedule: '', lastRun: '2026-03-20T14:30:00Z', description: 'Job applications' }
      ];
    }

    function getMockCronJobs() {
      return [
        { id: '1', name: 'Cami Daily Briefing', icon: '📅', schedule: 'Daily (Mon-Sat) 18:00', nextRun: '2026-03-28T13:24:50Z', lastRun: '2026-03-27T12:24:50Z', duration: '19.2s', status: 'success' },
        { id: '2', name: 'Research Scout Hunt #1', icon: '🔍', schedule: 'Daily 08:00', nextRun: '2026-03-28T13:24:50Z', lastRun: '2026-03-27T12:24:50Z', duration: '27.7s', status: 'success' },
        { id: '3', name: 'Research Scout Hunt #2', icon: '🔍', schedule: 'Daily 16:00', nextRun: '2026-03-28T13:24:50Z', lastRun: '2026-03-26T13:24:50Z', duration: '11.4s', status: 'success' },
        { id: '4', name: 'Research Scout Hunt #3', icon: '🔍', schedule: 'Daily 00:00', nextRun: '2026-03-28T13:24:50Z', lastRun: '2026-03-26T13:24:50Z', duration: '9.3s', status: 'success' },
        { id: '5', name: 'Bouncer Security Audit', icon: '🚪', schedule: 'Daily 01:00', nextRun: '2026-03-28T13:24:50Z', lastRun: '2026-03-26T13:24:50Z', duration: '34.7s', status: 'success' },
        { id: '6', name: 'Consolidate Memory', icon: '🧠', schedule: 'Daily 22:00', nextRun: '2026-03-28T13:24:50Z', lastRun: '2026-03-27T12:24:50Z', duration: '6.0s', status: 'success' },
        { id: '7', name: 'Healthcheck Security Audit', icon: '⚠️', schedule: 'Daily 02:00', nextRun: '2026-03-28T13:24:50Z', lastRun: '2026-03-27T12:24:50Z', duration: '12.4s', status: 'error' },
        { id: '8', name: 'Cami Weekly Briefing', icon: '📅', schedule: 'Sunday 18:00', nextRun: '2026-03-29T20:00:00Z', lastRun: '2026-03-22T19:00:09Z', duration: '16.9s', status: 'success' }
      ];
    }

    function formatDate(isoString) {
      if (!isoString) return 'N/A';
      const date = new Date(isoString);
      return date.toLocaleString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function showDashboard() {
      const agentTabContent = `<table><thead><tr><th>Agent</th><th>Version</th><th>Status</th><th>Next Run</th><th>Last Run</th></tr></thead><tbody>${agents.map(a => `<tr><td>${a.icon} ${a.name}</td><td>${a.version}</td><td><span class="status-badge status-${a.status}">${a.status}</span></td><td>${formatDate(a.nextSchedule)}</td><td>${formatDate(a.lastRun)}</td></tr>`).join('')}</tbody></table>`;
      const cronTabContent = `<table><thead><tr><th>Job</th><th>Schedule</th><th>Next Run</th><th>Last Run</th><th>Duration</th><th>Status</th></tr></thead><tbody>${cronJobs.map(j => `<tr><td>${j.icon} ${j.name}</td><td>${j.schedule}</td><td>${formatDate(j.nextRun)}</td><td>${formatDate(j.lastRun)}</td><td>${j.duration}</td><td><span class="status-badge status-${j.status}">${j.status}</span></td></tr>`).join('')}</tbody></table>`;
      document.getElementById('main').innerHTML = `<div style="margin-bottom: 20px;"><button class="tab-btn ${activeTab === 'agents' ? 'active' : ''}" onclick="switchTab('agents')" style="font-size: 0.95rem; font-weight: 600;">⚡ Agents</button><button class="tab-btn ${activeTab === 'crons' ? 'active' : ''}" onclick="switchTab('crons')" style="font-size: 0.95rem; font-weight: 600;">🕐 Scheduled Jobs</button></div>${activeTab === 'agents' ? agentTabContent : cronTabContent}<div class="last-updated">Last updated: ${lastUpdated}</div>`;
    }

    if (localStorage.getItem('dashboardLoggedIn')) {
      isLoggedIn = true;
      fetchDataFromWebhook();
    } else {
      document.getElementById('main').innerHTML = `<div class="login-form"><h2 style="color: #2196f3; text-align: center; margin-bottom: 20px;">Dashboard Login</h2><form onsubmit="handleLogin(event)"><input type="password" id="passwordInput" placeholder="Enter password" required><button type="submit">Log In</button></form><div id="loginError" class="error" style="display: none;"></div></div>`;
    }

    setInterval(() => {
      if (isLoggedIn) fetchDataFromWebhook();
    }, 5000);

    function handleLogin(e) {
      e.preventDefault();
      const password = document.getElementById('passwordInput').value;
      if (password === 'admin') {
        isLoggedIn = true;
        localStorage.setItem('dashboardLoggedIn', 'true');
        fetchDataFromWebhook();
      } else {
        document.getElementById('loginError').textContent = 'Invalid credentials';
        document.getElementById('loginError').style.display = 'block';
      }
    }
  </script>
</body>
</html>
