<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Command Center - Testing Dashboard v1.0.20</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0a0a0a; color: #d1d5db; padding: 20px; min-height: 100vh; }
    .container { max-width: 1400px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 20px; border: 1px solid #1f2937; border-radius: 8px; background: rgba(20, 20, 25, 0.5); }
    h1 { color: #60a5fa; font-size: 2em; margin-bottom: 5px; }
    .subtitle { color: #9ca3af; font-size: 0.9em; }
    .header-buttons { display: flex; gap: 10px; }
    button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
    .btn-refresh { background: #3b82f6; color: white; }
    .btn-refresh:hover { background: #2563eb; }
    .btn-logout { background: #ef4444; color: white; }
    .btn-logout:hover { background: #dc2626; }
    .tabs { display: flex; gap: 10px; margin: 20px 0; border-bottom: 2px solid #1f2937; }
    .tab-btn { padding: 10px 20px; background: none; border: none; color: #9ca3af; cursor: pointer; font-size: 1em; border-bottom: 3px solid transparent; transition: all 0.2s; }
    .tab-btn.active { color: #60a5fa; border-bottom-color: #60a5fa; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    table { width: 100%; border-collapse: collapse; background: rgba(20, 20, 25, 0.7); border: 1px solid #1f2937; border-radius: 4px; margin: 20px 0; }
    thead { background: rgba(96, 165, 250, 0.1); }
    th { padding: 12px; text-align: left; color: #60a5fa; font-weight: 600; border-bottom: 1px solid #1f2937; }
    td { padding: 10px 12px; border-bottom: 1px solid #1f2937; }
    tr:hover { background: rgba(96, 165, 250, 0.05); }
    .status { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: 600; }
    .status.running { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .status.idle { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; }
    .status.success { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .status.error { background: rgba(244, 67, 54, 0.2); color: #f44336; }
    .status.scheduled { background: rgba(33, 150, 243, 0.2); color: #2196f3; }
    #login { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.9); z-index: 1000; }
    #login.hidden { display: none; }
    .login-box { background: rgba(20, 20, 25, 0.9); border: 1px solid #1f2937; border-radius: 8px; padding: 30px; width: 100%; max-width: 400px; }
    .login-box h2 { color: #60a5fa; margin-bottom: 20px; text-align: center; }
    .login-box input { width: 100%; padding: 10px; margin: 10px 0; background: rgba(0, 0, 0, 0.5); border: 1px solid #374151; border-radius: 4px; color: #d1d5db; }
    .login-box button { width: 100%; padding: 10px; margin: 10px 0; }
    #loginError { color: #f44336; margin-top: 10px; display: none; text-align: center; }
    .refresh-status { color: #60a5fa; font-size: 0.9em; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <div id="login" class="login-box-container">
    <div class="login-box">
      <h2>🔐 Dashboard Login</h2>
      <form onsubmit="handleLogin(event)">
        <input type="password" id="passwordInput" placeholder="Enter password" required>
        <button type="submit" class="btn-refresh">Access Dashboard</button>
      </form>
      <div id="loginError"></div>
    </div>
  </div>

  <div id="dashboard" style="display:none;">
    <div class="container">
      <header>
        <div>
          <h1>🎯 Agent Command Center</h1>
          <p class="subtitle">Real-time monitoring • v1.0.20</p>
        </div>
        <div class="header-buttons">
          <button class="btn-refresh" id="refreshBtn">🔄 Refresh</button>
          <button class="btn-logout" onclick="handleLogout()">🚪 Logout</button>
        </div>
      </header>
      <div class="refresh-status" id="refreshStatus">Fetching data...</div>

      <div class="tabs">
        <button class="tab-btn active" id="agentsTabBtn" onclick="switchTab('agents', event)">⚡ Agents</button>
        <button class="tab-btn" id="cronsTabBtn" onclick="switchTab('crons', event)">🕐 Jobs</button>
        <button class="tab-btn" id="calendarsTabBtn" onclick="switchTab('calendars', event)">📅 Calendars</button>
      </div>

      <div id="agents-tab" class="tab-content active">
        <table>
          <thead>
            <tr>
              <th>Agent</th>
              <th>Version</th>
              <th>Status</th>
              <th>Next Run</th>
              <th>Last Run</th>
            </tr>
          </thead>
          <tbody id="agents-tbody"></tbody>
        </table>
      </div>

      <div id="crons-tab" class="tab-content">
        <table>
          <thead>
            <tr>
              <th>Job</th>
              <th>Schedule</th>
              <th>Next Run</th>
              <th>Last Run</th>
              <th>Duration</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="crons-tbody"></tbody>
        </table>
      </div>

      <div id="calendars-tab" class="tab-content">
        <table>
          <thead>
            <tr>
              <th>Calendar</th>
              <th>Description</th>
              <th>Access</th>
            </tr>
          </thead>
          <tbody id="calendars-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let isLoggedIn = false;
    let agents = [];
    let cronJobs = [];
    let calendars = [];
    let currentTab = 'agents';

    function formatDate(isoStr) {
      if (!isoStr) return 'N/A';
      const d = new Date(isoStr);
      const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
      const h = String(d.getHours()).padStart(2,'0'), min = String(d.getMinutes()).padStart(2,'0');
      return `${day}.${m}.${y} ${h}:${min}`;
    }

    function handleLogin(e) {
      e.preventDefault();
      const pwd = document.getElementById('passwordInput').value;
      if (pwd === 'admin') {
        isLoggedIn = true;
        localStorage.setItem('dashboardLoggedIn', 'true');
        document.getElementById('login').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        fetchData();
      } else {
        document.getElementById('loginError').textContent = '❌ Invalid password';
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function handleLogout() {
      isLoggedIn = false;
      localStorage.removeItem('dashboardLoggedIn');
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('login').style.display = 'flex';
      document.getElementById('passwordInput').value = '';
    }

    function switchTab(tab, event) {
      console.log('[TAB] Switching to:', tab);
      currentTab = tab;
      
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      
      document.getElementById(tab + '-tab').classList.add('active');
      
      if (event && event.target) {
        event.target.classList.add('active');
      } else {
        if (tab === 'agents') document.getElementById('agentsTabBtn').classList.add('active');
        else if (tab === 'crons') document.getElementById('cronsTabBtn').classList.add('active');
        else if (tab === 'calendars') document.getElementById('calendarsTabBtn').classList.add('active');
      }
      
      console.log('[TAB] ✓ Switched to', tab);
    }

    async function fetchData() {
      console.log('[REFRESH] Button clicked - fetching data');
      const statusEl = document.getElementById('refreshStatus');
      statusEl.style.display = 'block';
      statusEl.textContent = '⏳ Fetching data...';
      
      try {
        console.log('[FETCH] Getting data from /api/webhook');
        const res = await fetch('/api/webhook');
        console.log('[FETCH] Response status:', res.status);
        
        if (!res.ok) {
          throw new Error('Webhook returned ' + res.status);
        }
        
        const data = await res.json();
        console.log('[FETCH] Response data:', data);
        
        if (data.success && data.data) {
          agents = (data.data.agents || []).slice(1).map(row => ({
            id: row.values[0]?.formattedValue || '',
            name: row.values[1]?.formattedValue || '',
            icon: row.values[2]?.formattedValue || '📋',
            version: row.values[3]?.formattedValue || '',
            status: row.values[4]?.formattedValue || 'idle',
            nextSchedule: row.values[5]?.formattedValue || '',
            lastRun: row.values[6]?.formattedValue || ''
          })).filter(a => a.name);
          
          cronJobs = (data.data.jobs || []).slice(1).map(row => ({
            id: row.values[0]?.formattedValue || '',
            name: row.values[1]?.formattedValue || '',
            icon: row.values[2]?.formattedValue || '📋',
            schedule: row.values[3]?.formattedValue || '',
            nextRun: row.values[4]?.formattedValue || '',
            lastRun: row.values[5]?.formattedValue || '',
            duration: row.values[6]?.formattedValue || '',
            status: row.values[7]?.formattedValue || ''
          })).filter(j => j.name);
          
          calendars = (data.data.calendars || []).slice(1).map(row => ({
            id: row.values[0]?.formattedValue || '',
            name: row.values[1]?.formattedValue || '',
            description: row.values[2]?.formattedValue || '',
            access: row.values[3]?.formattedValue || ''
          })).filter(c => c.name);
          
          console.log('[FETCH] ✅ Got', agents.length, 'agents,', cronJobs.length, 'jobs,', calendars.length, 'calendars');
          statusEl.textContent = '✅ Data refreshed: ' + agents.length + ' agents, ' + cronJobs.length + ' jobs';
        } else {
          throw new Error('Invalid response format');
        }
      } catch (e) {
        console.error('[FETCH] ❌ Error:', e.message);
        console.log('[FETCH] Using mock data');
        statusEl.textContent = '⚠️ Using mock data (webhook unavailable)';
        loadMockData();
      }
      
      renderData();
      setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
    }

    function loadMockData() {
      agents = [
        { id: '1', name: 'Staff Sergeant Agent', icon: '⚡', version: 'v2.0', status: 'running', nextSchedule: '2026-03-31T09:00:00Z', lastRun: '2026-03-27T08:00:00Z' },
        { id: '2', name: 'Cami Agent (Daily)', icon: '📅', version: 'v1.0', status: 'scheduled', nextSchedule: '2026-03-30T18:00:00Z', lastRun: '2026-03-29T08:00:00Z' }
      ];
      cronJobs = [
        { id: '1', name: 'Cami Daily Briefing', icon: '📅', schedule: 'Daily 18:00', nextRun: '2026-03-30T13:24:50Z', lastRun: '2026-03-29T12:24:50Z', duration: '19.2s', status: 'success' },
        { id: '2', name: 'Research Scout', icon: '🔍', schedule: 'Daily 08:00', nextRun: '2026-03-30T13:24:50Z', lastRun: '2026-03-29T12:24:50Z', duration: '27.7s', status: 'success' }
      ];
      calendars = [
        { id: '1', name: 'FLCAL - Allgemein', description: 'General scheduling', access: 'Writer' },
        { id: '2', name: 'dk.heinz@gmail.com', description: 'Personal', access: 'Writer' }
      ];
    }

    function renderData() {
      document.getElementById('agents-tbody').innerHTML = agents.map(a => `
        <tr>
          <td>${a.icon} ${a.name}</td>
          <td>${a.version}</td>
          <td><span class="status ${a.status}">${a.status}</span></td>
          <td>${formatDate(a.nextSchedule)}</td>
          <td>${formatDate(a.lastRun)}</td>
        </tr>
      `).join('');
      
      document.getElementById('crons-tbody').innerHTML = cronJobs.map(j => `
        <tr>
          <td>${j.icon} ${j.name}</td>
          <td>${j.schedule}</td>
          <td>${formatDate(j.nextRun)}</td>
          <td>${formatDate(j.lastRun)}</td>
          <td>${j.duration}</td>
          <td><span class="status ${j.status}">${j.status}</span></td>
        </tr>
      `).join('');
      
      document.getElementById('calendars-tbody').innerHTML = calendars.map(c => `
        <tr>
          <td>${c.name}</td>
          <td>${c.description}</td>
          <td><span class="status ${c.access.toLowerCase()}">${c.access}</span></td>
        </tr>
      `).join('');
    }

    window.addEventListener('DOMContentLoaded', function() {
      console.log('[INIT] Dashboard initialized');
      const refreshBtn = document.getElementById('refreshBtn');
      if (refreshBtn) {
        refreshBtn.addEventListener('click', function(e) {
          e.preventDefault();
          console.log('[REFRESH] Button click detected');
          fetchData();
        });
        console.log('[INIT] ✓ Refresh button listener attached');
      } else {
        console.error('[INIT] ❌ Refresh button not found');
      }
    });

    if (localStorage.getItem('dashboardLoggedIn')) {
      isLoggedIn = true;
      document.getElementById('login').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      fetchData();
    } else {
      document.getElementById('login').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
    }
  </script>
</body>
</html>
