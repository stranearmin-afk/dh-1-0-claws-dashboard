<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Command Center v1.0</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; background-image: radial-gradient(circle at 20% 50%, rgba(33, 150, 243, 0.1), transparent), radial-gradient(circle at 80% 80%, rgba(156, 39, 176, 0.05), transparent); color: #e0e0e0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 30px; }
    h1 { color: #2196f3; font-size: 2.5em; margin-bottom: 10px; }
    .subtitle { color: #90caf9; font-size: 1.1em; }
    .tabs { display: flex; gap: 10px; margin: 30px 0; border-bottom: 2px solid #333; }
    .tab-btn { padding: 10px 20px; background: none; border: none; color: #90caf9; cursor: pointer; font-size: 1em; border-bottom: 3px solid transparent; transition: all 0.3s; }
    .tab-btn.active { color: #2196f3; border-bottom-color: #2196f3; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    table { width: 100%; border-collapse: collapse; background: rgba(20, 20, 30, 0.8); border: 1px solid #333; border-radius: 4px; margin: 20px 0; }
    thead { background: rgba(33, 150, 243, 0.1); }
    th { padding: 12px; text-align: left; color: #2196f3; font-weight: 600; border-bottom: 2px solid #333; }
    td { padding: 10px 12px; border-bottom: 1px solid #333; }
    tr:hover { background: rgba(33, 150, 243, 0.05); }
    .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: 600; }
    .status-active { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .status-idle { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; }
    .status-success { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .status-error { background: rgba(244, 67, 54, 0.2); color: #f44336; }
    .login-form { max-width: 300px; margin: 100px auto; padding: 30px; background: rgba(20, 20, 30, 0.9); border: 1px solid #333; border-radius: 4px; }
    .login-form input { width: 100%; padding: 10px; margin: 10px 0; background: #1a1a2e; border: 1px solid #333; color: #e0e0e0; border-radius: 4px; }
    .login-form button { width: 100%; padding: 10px; background: #2196f3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; margin-top: 10px; }
    .error { color: #f44336; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚙️ Agent Command Center v1.0.4 (Testing)</h1>
      <p class="subtitle">Real-time agent and cron job monitoring</p>
    </header>
    <main id="main"></main>
  </div>
  <script>
    let isLoggedIn = false;
    let agents = [];
    let cronJobs = [];
    let agentSort = 'status';
    let cronSort = 'next';
    let expandedAgentId = null;
    let expandedCronId = null;
    let activeTab = localStorage.getItem('dashboardTab') || 'crons';
    const APP_VERSION = 'v1.0.4';

    function switchTab(tab) {
      activeTab = tab;
      localStorage.setItem('dashboardTab', tab);
      showDashboard();
    }

    async function fetchData() {
      try {
        const [agentsRes, cronRes] = await Promise.all([fetch('/api/agents-real'), fetch('/api/cron-jobs')]);
        if (agentsRes.ok) {
          agents = (await agentsRes.json()).agents || [];
        } else {
          agents = getMockAgents();
        }
        if (cronRes.ok) {
          cronJobs = (await cronRes.json()).cron_jobs || [];
        } else {
          cronJobs = getMockCronJobs();
        }
        showDashboard();
      } catch (err) {
        agents = getMockAgents();
        cronJobs = getMockCronJobs();
        showDashboard();
      }
    }

    function getMockAgents() {
      return [
        { id: '1', name: 'Staff Sergeant Agent', icon: '⚡', version: 'v2.0', status: 'active', nextSchedule: '2026-03-31T09:00:00Z', lastRun: '2026-03-27T08:00:00Z' },
        { id: '2', name: 'Sergeant First Class', icon: '🎖️', version: 'v2.1', status: 'active', nextSchedule: '2026-03-31T10:00:00Z', lastRun: '2026-03-26T10:00:00Z' },
        { id: '3', name: 'Cami Agent (Weekly)', icon: '📅', version: 'v1.0', status: 'active', nextSchedule: '2026-03-29T18:00:00Z', lastRun: '2026-03-22T18:00:00Z' },
        { id: '4', name: 'Cami Agent (Daily)', icon: '📅', version: 'v1.0', status: 'active', nextSchedule: '2026-03-28T18:00:00Z', lastRun: '2026-03-27T08:00:00Z' },
        { id: '5', name: 'Research Scout', icon: '🔍', version: 'Daily', status: 'active', nextSchedule: '2026-03-27T16:00:00Z', lastRun: '2026-03-27T13:00:00Z' },
        { id: '6', name: 'Bouncer Agent', icon: '🚪', version: 'Daily', status: 'active', nextSchedule: '2026-03-28T01:00:00Z', lastRun: '2026-03-27T01:00:00Z' },
        { id: '7', name: 'Job Application Agent', icon: '💼', version: 'v2.0', status: 'idle', nextSchedule: null, lastRun: '2026-03-20T14:30:00Z' }
      ];
    }
    
    function getMockCronJobs() {
      return [
        { id: '1', name: 'Cami Daily Briefing', schedule: 'Daily (Mon-Sat) 18:00', nextRun: '2026-03-28T13:24:50Z', lastRun: '2026-03-27T12:24:50Z', duration: '19.2s', status: 'success' },
        { id: '2', name: 'Research Scout Hunt #1', schedule: 'Daily 08:00', nextRun: '2026-03-28T13:24:50Z', lastRun: '2026-03-27T12:24:50Z', duration: '27.7s', status: 'success' },
        { id: '3', name: 'Research Scout Hunt #2', schedule: 'Daily 16:00', nextRun: '2026-03-28T13:24:50Z', lastRun: '2026-03-26T13:24:50Z', duration: '11.4s', status: 'success' },
        { id: '4', name: 'Research Scout Hunt #3', schedule: 'Daily 00:00', nextRun: '2026-03-28T13:24:50Z', lastRun: '2026-03-26T13:24:50Z', duration: '9.3s', status: 'success' },
        { id: '5', name: 'Bouncer Security Audit', schedule: 'Daily 01:00', nextRun: '2026-03-28T13:24:50Z', lastRun: '2026-03-26T13:24:50Z', duration: '34.7s', status: 'success' },
        { id: '6', name: 'Consolidate Memory', schedule: 'Daily 22:00', nextRun: '2026-03-28T13:24:50Z', lastRun: '2026-03-27T12:24:50Z', duration: '6.0s', status: 'success' },
        { id: '7', name: 'Healthcheck Security Audit', schedule: 'Daily 02:00', nextRun: '2026-03-28T13:24:50Z', lastRun: '2026-03-27T12:24:50Z', duration: '12.4s', status: 'error' },
        { id: '8', name: 'Cami Weekly Briefing', schedule: 'Sunday 18:00', nextRun: '2026-03-29T20:00:00Z', lastRun: '2026-03-22T19:00:09Z', duration: '16.9s', status: 'success' }
      ];
    }

    function formatDate(isoString) {
      const date = new Date(isoString);
      return date.toLocaleString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function showDashboard() {
      const agentTabContent = `<table><thead><tr><th>Agent</th><th>Version</th><th>Status</th><th>Next Run</th><th>Last Run</th></tr></thead><tbody>${agents.map(a => `<tr><td>${a.icon} ${a.name}</td><td>${a.version}</td><td><span class="status-badge status-${a.status}">${a.status}</span></td><td>${a.nextSchedule ? formatDate(a.nextSchedule) : 'N/A'}</td><td>${formatDate(a.lastRun)}</td></tr>`).join('')}</tbody></table>`;
      const cronTabContent = `<table><thead><tr><th>Job</th><th>Schedule</th><th>Next Run</th><th>Last Run</th><th>Duration</th><th>Status</th></tr></thead><tbody>${cronJobs.map(j => `<tr><td>${j.name}</td><td>${j.schedule}</td><td>${formatDate(j.nextRun)}</td><td>${formatDate(j.lastRun)}</td><td>${j.duration}</td><td><span class="status-badge status-${j.status}">${j.status}</span></td></tr>`).join('')}</tbody></table>`;
      document.getElementById('main').innerHTML = `<div style="margin-bottom: 20px;"><button class="tab-btn ${activeTab === 'agents' ? 'active' : ''}" onclick="switchTab('agents')" style="font-size: 0.95rem; font-weight: 600; transition: all 0.2s; position: relative; top: 1px;">⚡ Agents</button><button class="tab-btn ${activeTab === 'crons' ? 'active' : ''}" onclick="switchTab('crons')" style="font-size: 0.95rem; font-weight: 600; transition: all 0.2s; position: relative; top: 1px;">⏰ Scheduled Jobs</button></div>${activeTab === 'agents' ? agentTabContent : cronTabContent}</main></div>`;
    }

    function handleLogin(e) {
      e.preventDefault();
      const password = document.getElementById('passwordInput').value;
      if (password === 'admin') {
        isLoggedIn = true;
        localStorage.setItem('dashboardLoggedIn', 'true');
        fetchData();
      } else {
        document.getElementById('loginError').textContent = 'Invalid credentials';
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function handleLogout() {
      isLoggedIn = false;
      localStorage.removeItem('dashboardLoggedIn');
      showLogin();
    }

    function showLogin() {
      document.getElementById('main').innerHTML = `<div class="login-form"><h2 style="color: #2196f3; text-align: center; margin-bottom: 20px;">Dashboard Login</h2><form onsubmit="handleLogin(event)"><input type="password" id="passwordInput" placeholder="Enter password" required><button type="submit">Login</button></form><div id="loginError" class="error" style="display: none;"></div></div>`;
    }

    if (localStorage.getItem('dashboardLoggedIn')) {
      isLoggedIn = true;
      fetchData();
    } else {
      showLogin();
    }

    setInterval(() => {
      if (isLoggedIn) fetchData();
    }, 30000);
  </script>
</body>
</html>
