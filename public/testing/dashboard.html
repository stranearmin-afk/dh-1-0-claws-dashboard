<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🤖</text></svg>">
  <title>Agent Command Center - v1.0.28</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0a0a0a; color: #d1d5db; padding: 20px; min-height: 100vh; }
    .container { max-width: 1400px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 20px; border: 1px solid #1f2937; border-radius: 8px; background: rgba(20, 20, 25, 0.5); }
    h1 { color: #60a5fa; font-size: 2em; margin-bottom: 5px; }
    .subtitle { color: #9ca3af; font-size: 0.9em; }
    .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .header-left { flex: 1; }
    .header-right { display: flex; gap: 10px; align-items: center; }
    .timezone-info { text-align: right; font-size: 0.9em; color: #9ca3af; }
    .timezone-info .time { color: #60a5fa; font-weight: 600; font-size: 1.1em; }
    .timezone-info .tz { color: #6b7280; font-size: 0.85em; }
    button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
    .btn-icon { padding: 8px 12px; background: none; color: #60a5fa; font-size: 1.2em; cursor: pointer; border: 1px solid #1f2937; border-radius: 4px; transition: all 0.2s; }
    .btn-icon:hover { background: rgba(96, 165, 250, 0.1); color: #93c5fd; }
    .search-box { margin: 20px 0; }
    .search-box input { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid #374151; border-radius: 4px; color: #d1d5db; font-size: 1em; }
    .search-box input::placeholder { color: #6b7280; }
    .tabs { display: flex; gap: 10px; margin: 20px 0; border-bottom: 2px solid #1f2937; }
    .tab-btn { padding: 10px 20px; background: none; border: none; color: #9ca3af; cursor: pointer; font-size: 1em; border-bottom: 3px solid transparent; transition: all 0.2s; }
    .tab-btn.active { color: #60a5fa; border-bottom-color: #60a5fa; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    table { width: 100%; border-collapse: collapse; background: rgba(20, 20, 25, 0.7); border: 1px solid #1f2937; border-radius: 4px; margin: 20px 0; }
    thead { background: rgba(96, 165, 250, 0.1); }
    th { padding: 12px; text-align: left; color: #60a5fa; font-weight: 600; border-bottom: 1px solid #1f2937; }
    td { padding: 10px 12px; border-bottom: 1px solid #1f2937; }
    tr { cursor: pointer; transition: background 0.2s; }
    tr:hover { background: rgba(96, 165, 250, 0.05); }
    tr.expanded { background: rgba(96, 165, 250, 0.1); }
    .expand-icon { color: #60a5fa; margin-right: 8px; user-select: none; }
    .detail-row { display: none; }
    .detail-row.shown { display: table-row; }
    .detail-cell { padding: 20px; background: rgba(0, 0, 0, 0.3); border-top: 1px solid #1f2937; }
    .detail-cell h4 { color: #60a5fa; margin-bottom: 8px; font-size: 0.95em; }
    .detail-cell p { color: #d1d5db; line-height: 1.6; }
    .status { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: 600; }
    .status.running { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .status.idle { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; }
    .status.success { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .status.error { background: rgba(244, 67, 54, 0.2); color: #f44336; }
    .status.scheduled { background: rgba(33, 150, 243, 0.2); color: #2196f3; }
    .status.writer { background: rgba(33, 150, 243, 0.2); color: #2196f3; }
    .status.reader { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; }
    .tooltip { position: relative; display: inline-block; cursor: help; border-bottom: 1px dotted #60a5fa; }
    .tooltip .tooltiptext { visibility: hidden; background-color: rgba(0, 0, 0, 0.8); color: #d1d5db; text-align: left; padding: 10px; border-radius: 4px; position: absolute; z-index: 100; bottom: 125%; left: 0; white-space: normal; width: 250px; font-size: 0.85em; border: 1px solid #1f2937; }
    .tooltip .tooltiptext::after { content: ""; position: absolute; top: 100%; left: 10px; margin-left: -5px; border-width: 5px; border-style: solid; border-color: rgba(0, 0, 0, 0.8) transparent transparent transparent; }
    .tooltip:hover .tooltiptext { visibility: visible; }
    #login { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.9); z-index: 1000; }
    .login-box { background: rgba(20, 20, 25, 0.9); border: 1px solid #1f2937; border-radius: 8px; padding: 30px; width: 100%; max-width: 400px; }
    .login-box h2 { color: #60a5fa; margin-bottom: 20px; text-align: center; }
    .login-box input { width: 100%; padding: 10px; margin: 10px 0; background: rgba(0, 0, 0, 0.5); border: 1px solid #374151; border-radius: 4px; color: #d1d5db; }
    .login-box button { width: 100%; padding: 10px; margin: 10px 0; background: #3b82f6; color: white; }
    .login-box button:hover { background: #2563eb; }
    #loginError { color: #f44336; margin-top: 10px; display: none; text-align: center; }
    .refresh-status { color: #60a5fa; font-size: 0.9em; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <div id="login" class="login-box-container">
    <div class="login-box">
      <h2>🔐 Dashboard Login</h2>
      <form onsubmit="handleLogin(event)">
        <input type="password" id="passwordInput" placeholder="Enter password" required>
        <button type="submit">Access Dashboard</button>
      </form>
      <div id="loginError"></div>
    </div>
  </div>

  <div id="dashboard" style="display:none;">
    <div class="container">
      <header>
        <div class="header-top">
          <div class="header-left">
            <h1>🤖 Agent Command Center</h1>
            <p class="subtitle">Real-time monitoring • v1.0.28</p>
          </div>
          <div class="header-right">
            <div class="timezone-info">
              <div class="time" id="currentTime">--:--:-- CET</div>
              <div class="tz">🌐 Europe/Berlin (UTC+1)</div>
            </div>
            <button class="btn-icon" id="refreshBtn" title="Refresh Data">🔄</button>
            <button class="btn-icon" onclick="handleLogout()" title="Logout">🚪</button>
          </div>
        </div>
      </header>
      <div class="refresh-status" id="refreshStatus">Fetching data...</div>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Search agents, jobs, or calendars..." onkeyup="filterData()">
      </div>

      <div class="tabs">
        <button class="tab-btn active" id="agentsTabBtn" onclick="switchTab('agents', event)">⚡ Agents</button>
        <button class="tab-btn" id="cronsTabBtn" onclick="switchTab('crons', event)">🕐 Jobs</button>
        <button class="tab-btn" id="calendarsTabBtn" onclick="switchTab('calendars', event)">📅 Calendars</button>
      </div>

      <div id="agents-tab" class="tab-content active">
        <table id="agents-table">
          <thead>
            <tr>
              <th style="width: 40px;"></th>
              <th>Agent</th>
              <th>Version</th>
              <th>Status</th>
              <th>Next Run</th>
              <th>Last Run</th>
            </tr>
          </thead>
          <tbody id="agents-tbody"></tbody>
        </table>
      </div>

      <div id="crons-tab" class="tab-content">
        <table id="crons-table">
          <thead>
            <tr>
              <th style="width: 40px;"></th>
              <th>Job</th>
              <th>Schedule</th>
              <th>Next Run</th>
              <th>Last Run</th>
              <th>Duration</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="crons-tbody"></tbody>
        </table>
      </div>

      <div id="calendars-tab" class="tab-content">
        <table id="calendars-table">
          <thead>
            <tr>
              <th style="width: 40px;"></th>
              <th>Calendar Name</th>
              <th>Description</th>
              <th>Access</th>
              <th>Calendar ID</th>
            </tr>
          </thead>
          <tbody id="calendars-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let isLoggedIn = false;
    let agents = [];
    let cronJobs = [];
    let calendars = [];
    let currentTab = 'agents';
    let allData = {};

    function updateClock() {
      const now = new Date();
      const berlinTime = new Intl.DateTimeFormat('en-US', {
        timeZone: 'Europe/Berlin',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      }).format(now);
      document.getElementById('currentTime').textContent = berlinTime + ' CET';
    }

    setInterval(updateClock, 1000);
    updateClock();

    function formatDate(isoStr) {
      if (!isoStr) return 'N/A';
      const d = new Date(isoStr);
      const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
      const h = String(d.getHours()).padStart(2,'0'), min = String(d.getMinutes()).padStart(2,'0');
      return `${day}.${m}.${y} ${h}:${min}`;
    }

    function handleLogin(e) {
      e.preventDefault();
      const pwd = document.getElementById('passwordInput').value;
      if (pwd === 'admin') {
        isLoggedIn = true;
        localStorage.setItem('dashboardLoggedIn', 'true');
        document.getElementById('login').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        fetchData();
      } else {
        document.getElementById('loginError').textContent = '❌ Invalid password';
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function handleLogout() {
      isLoggedIn = false;
      localStorage.removeItem('dashboardLoggedIn');
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('login').style.display = 'flex';
      document.getElementById('passwordInput').value = '';
    }

    function switchTab(tab, event) {
      currentTab = tab;
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tab + '-tab').classList.add('active');
      if (event && event.target) event.target.classList.add('active');
    }

    function toggleDetail(id, type) {
      const detailRow = document.getElementById(`detail-${type}-${id}`);
      const mainRow = document.getElementById(`row-${type}-${id}`);
      if (detailRow) {
        detailRow.classList.toggle('shown');
        mainRow.classList.toggle('expanded');
      }
    }

    function filterData() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      document.querySelectorAll('table tbody tr').forEach(row => {
        if (!row.id.startsWith('detail-')) {
          const text = row.textContent.toLowerCase();
          const matches = text.includes(query);
          row.style.display = matches ? '' : 'none';
          const detailId = row.id.replace('row-', 'detail-');
          const detailRow = document.getElementById(detailId);
          if (detailRow) detailRow.style.display = matches ? '' : 'none';
        }
      });
    }

    async function fetchData() {
      const statusEl = document.getElementById('refreshStatus');
      statusEl.style.display = 'block';
      statusEl.textContent = '⏳ Fetching data...';
      
      try {
        const res = await fetch('/api/sheets');
        if (!res.ok) throw new Error('API returned ' + res.status);
        
        const data = await res.json();
        if (data.success && data.data) {
          allData = data.data;
          
          const agentsList = data.data.agents || [];
          const jobsList = data.data.jobs || [];
          const calendarsList = data.data.calendars || [];
          
          agents = agentsList
            .map((row, idx) => {
              if (Array.isArray(row)) {
                return { 
                  id: row[0] || '', 
                  name: row[1] || '', 
                  icon: row[2] || '📌', 
                  version: row[3] || '', 
                  status: row[4] || 'idle', 
                  nextSchedule: row[5] || '', 
                  lastRun: row[6] || '', 
                  description: row[7] || '' 
                };
              }
            })
            .filter((a) => {
              const nameStr = (a.name || '').toLowerCase();
              if (nameStr.includes('name') || nameStr.includes('id') || nameStr === '') return false;
              return true;
            });
          
          cronJobs = jobsList
            .map((row, idx) => {
              if (Array.isArray(row)) {
                return { 
                  id: row[0] || '', 
                  name: row[1] || '', 
                  icon: row[2] || '📋', 
                  schedule: row[3] || '', 
                  nextRun: row[4] || '', 
                  lastRun: row[5] || '', 
                  duration: row[6] || '', 
                  status: row[7] || '', 
                  description: row[8] || '' 
                };
              }
            })
            .filter((j) => {
              const nameStr = (j.name || '').toLowerCase();
              const durationStr = (j.duration || '').toLowerCase();
              if (nameStr.includes('name') || nameStr.includes('icon') || nameStr.includes('schedule') || nameStr === '') return false;
              if (durationStr.includes('nan') || durationStr.includes('duration')) return false;
              return true;
            });
          
          calendars = calendarsList
            .map((row, idx) => {
              if (Array.isArray(row)) {
                return { 
                  id: row[0] || '',
                  name: row[1] || '',
                  description: row[2] || '',
                  access: row[3] || '',
                  details: row[7] || ''
                };
              }
            })
            .filter((c) => {
              const nameStr = (c.name || '').toLowerCase();
              if (nameStr.includes('calendar') || nameStr.includes('name') || nameStr.includes('id') || nameStr === '') return false;
              return true;
            });
          
          statusEl.textContent = '✅ Data refreshed: ' + agents.length + ' agents, ' + cronJobs.length + ' jobs';
        }
      } catch (e) {
        statusEl.textContent = '⚠️ Using mock data (API unavailable)';
        loadMockData();
      }
      
      renderData();
      setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
    }

    function loadMockData() {
      agents = [
        { id: '1', name: 'Staff Sergeant Agent', icon: '⚡', version: 'v2.0', status: 'running', nextSchedule: '2026-03-31T09:00:00Z', lastRun: '2026-03-27T08:00:00Z', description: 'Core agent managing staff communications and scheduling' }
      ];
      cronJobs = [
        { id: '1', name: 'Cami Daily Briefing', icon: '📅', schedule: 'Daily 18:00', nextRun: '2026-03-30T13:24:50Z', lastRun: '2026-03-29T12:24:50Z', duration: '19.2s', status: 'success', description: 'Sends daily briefing with calendar and work summary' }
      ];
      calendars = [
        { id: 'FLCAL-001', name: 'FLCAL - Allgemein', description: 'General scheduling', access: 'Writer', details: 'All team members can edit general events and meetings' }
      ];
    }

    function renderData() {
      document.getElementById('agents-tbody').innerHTML = agents.map(a => `
        <tr id="row-agents-${a.id}" onclick="toggleDetail('${a.id}', 'agents')">
          <td><span class="expand-icon">▶</span></td>
          <td><span class="tooltip">${a.icon} ${a.name}<span class="tooltiptext">${a.description}</span></span></td>
          <td>${a.version}</td>
          <td><span class="status ${a.status}">${a.status}</span></td>
          <td>${formatDate(a.nextSchedule)}</td>
          <td>${formatDate(a.lastRun)}</td>
        </tr>
        <tr id="detail-agents-${a.id}" class="detail-row">
          <td colspan="6">
            <div class="detail-cell">
              <h4>📋 Description</h4>
              <p>${a.description || 'No description available'}</p>
            </div>
          </td>
        </tr>
      `).join('');
      
      document.getElementById('crons-tbody').innerHTML = cronJobs.map(j => `
        <tr id="row-crons-${j.id}" onclick="toggleDetail('${j.id}', 'crons')">
          <td><span class="expand-icon">▶</span></td>
          <td><span class="tooltip">${j.icon} ${j.name}<span class="tooltiptext">${j.description}</span></span></td>
          <td>${j.schedule}</td>
          <td>${formatDate(j.nextRun)}</td>
          <td>${formatDate(j.lastRun)}</td>
          <td>${j.duration}</td>
          <td><span class="status ${j.status}">${j.status}</span></td>
        </tr>
        <tr id="detail-crons-${j.id}" class="detail-row">
          <td colspan="7">
            <div class="detail-cell">
              <h4>📋 Description</h4>
              <p>${j.description || 'No description available'}</p>
            </div>
          </td>
        </tr>
      `).join('');
      
      document.getElementById('calendars-tbody').innerHTML = calendars.map(c => `
        <tr id="row-calendars-${c.id}" onclick="toggleDetail('${c.id}', 'calendars')">
          <td><span class="expand-icon">▶</span></td>
          <td><span class="tooltip">${c.name}<span class="tooltiptext">${c.details}</span></span></td>
          <td>${c.description}</td>
          <td><span class="status ${c.access.toLowerCase()}">${c.access}</span></td>
          <td><code>${c.id}</code></td>
        </tr>
        <tr id="detail-calendars-${c.id}" class="detail-row">
          <td colspan="5">
            <div class="detail-cell">
              <h4>📋 Details</h4>
              <p>${c.details || 'No additional details available'}</p>
            </div>
          </td>
        </tr>
      `).join('');
    }

    window.addEventListener('DOMContentLoaded', function() {
      const refreshBtn = document.getElementById('refreshBtn');
      if (refreshBtn) {
        refreshBtn.addEventListener('click', function(e) {
          e.preventDefault();
          fetchData();
        });
      }
    });

    if (localStorage.getItem('dashboardLoggedIn')) {
      isLoggedIn = true;
      document.getElementById('login').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      fetchData();
    } else {
      document.getElementById('login').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
    }
  </script>
</body>
</html>
