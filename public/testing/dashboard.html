<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Command Center - Testing Dashboard v1.0.17</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: #0a0a0a; 
      background-image: radial-gradient(circle at 20% 50%, rgba(33, 150, 243, 0.1), transparent), radial-gradient(circle at 80% 80%, rgba(156, 39, 176, 0.05), transparent); 
      color: #e0e0e0; 
      padding: 20px; 
    }
    .container { max-width: 1200px; margin: 0 auto; }
    header { 
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #333;
    }
    .header-left { text-align: left; }
    h1 { color: #2196f3; font-size: 2.5em; margin-bottom: 10px; }
    .subtitle { color: #90caf9; font-size: 1.1em; }
    .header-right { display: flex; gap: 15px; align-items: center; }
    .refresh-btn { 
      padding: 10px 20px; 
      background: #2196f3; 
      color: white; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-weight: 600;
      display: flex;
      gap: 8px;
      align-items: center;
      transition: all 0.3s;
    }
    .refresh-btn:hover { background: #1976d2; opacity: 0.9; }
    .logout-btn { 
      padding: 10px 15px; 
      background: #ef4444; 
      color: white; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-weight: 600;
      transition: all 0.3s;
    }
    .logout-btn:hover { background: #dc2626; opacity: 0.9; }
    .tabs { display: flex; gap: 10px; margin: 30px 0; border-bottom: 2px solid #333; }
    .tab-btn { padding: 10px 20px; background: none; border: none; color: #90caf9; cursor: pointer; font-size: 1em; border-bottom: 3px solid transparent; transition: all 0.3s; }
    .tab-btn.active { color: #2196f3; border-bottom-color: #2196f3; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    table { width: 100%; border-collapse: collapse; background: rgba(20, 20, 30, 0.8); border: 1px solid #333; border-radius: 4px; margin: 20px 0; }
    thead { background: rgba(33, 150, 243, 0.1); }
    th { padding: 12px; text-align: left; color: #2196f3; font-weight: 600; border-bottom: 2px solid #333; }
    td { padding: 10px 12px; border-bottom: 1px solid #333; }
    tr:hover { background: rgba(33, 150, 243, 0.05); }
    .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: 600; }
    .status-active { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .status-idle { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; }
    .status-success { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .status-error { background: rgba(244, 67, 54, 0.2); color: #f44336; }
    .loading { text-align: center; color: #90caf9; padding: 20px; }
    .last-updated { text-align: right; color: #666; font-size: 0.9em; margin-top: 10px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .calendar-card { 
      background: rgba(20, 20, 30, 0.8); 
      border: 1px solid #333; 
      border-radius: 4px; 
      padding: 20px;
      transition: all 0.3s;
    }
    .calendar-card:hover { background: rgba(33, 150, 243, 0.05); }
    .calendar-name { color: #2196f3; font-weight: 600; margin-bottom: 10px; }
    .calendar-desc { color: #90caf9; font-size: 0.9em; margin-bottom: 10px; }
    .calendar-access { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: 600; }
    .access-writer { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .access-reader { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>🎯📊 Agent Command Center</h1>
        <p class="subtitle">Real-time monitoring • v1.0.17</p>
      </div>
      <div class="header-right">
        <button class="refresh-btn" onclick="fetchDataFromWebhook()">
          <span>🔄</span> Refresh
        </button>
        <button class="logout-btn" onclick="handleLogout()">
          🚪 Logout
        </button>
      </div>
    </header>
    <main id="main"></main>
  </div>

  <script>
    const WEBHOOK_URL = '/api/webhook';
    const SPREADSHEET_ID = '1NyQHZXT-QkA7EX8LX3B4CAyWfzrRoAb9nbTMJmStGyk';
    
    let isLoggedIn = false;
    let agents = [];
    let cronJobs = [];
    let calendars = [];
    let activeTab = localStorage.getItem('dashboardTab') || 'agents';
    const APP_VERSION = 'v1.0.17';
    let lastUpdated = 'Never';

    function switchTab(tab) {
      activeTab = tab;
      localStorage.setItem('dashboardTab', tab);
      showDashboard();
    }

    async function fetchDataFromWebhook() {
      try {
        console.log('[WEBHOOK] Fetching data from', WEBHOOK_URL);
        const response = await fetch(WEBHOOK_URL);
        const result = await response.json();
        
        if (result.success && result.data) {
          console.log('[WEBHOOK] Got data:', result);
          
          if (result.data.agents) {
            agents = result.data.agents.slice(1).map(row => {
              const vals = (row.values || []).map(v => v.formattedValue || '');
              return { 
                id: vals[0], 
                name: vals[1], 
                icon: vals[2], 
                version: vals[3], 
                status: vals[4], 
                nextSchedule: vals[5], 
                lastRun: vals[6], 
                description: vals[7] 
              };
            }).filter(a => a.name);
          }
          
          if (result.data.jobs) {
            cronJobs = result.data.jobs.slice(1).map(row => {
              const vals = (row.values || []).map(v => v.formattedValue || '');
              return { 
                id: vals[0], 
                name: vals[1], 
                icon: vals[2], 
                schedule: vals[3], 
                nextRun: vals[4], 
                lastRun: vals[5], 
                duration: vals[6], 
                status: vals[7] 
              };
            }).filter(j => j.name);
          }

          if (result.data.calendars) {
            calendars = result.data.calendars.slice(1).map(row => {
              const vals = (row.values || []).map(v => v.formattedValue || '');
              return { 
                id: vals[0], 
                name: vals[1], 
                description: vals[2],
                access: vals[3]
              };
            }).filter(c => c.name);
          }
          
          lastUpdated = new Date().toLocaleTimeString();
          showDashboard();
          return;
        }
      } catch (err) {
        console.log('[WEBHOOK] Error or not available:', err.message);
      }
      
      console.log('[FALLBACK] Using mock data');
      agents = getMockAgents();
      cronJobs = getMockCronJobs();
      calendars = getMockCalendars();
      showDashboard();
    }

    function getMockAgents() {
      return [
        { id: '1', name: 'Staff Sergeant Agent', icon: '⚡', version: 'v2.0', status: 'active', nextSchedule: '2026-03-31T09:00:00Z', lastRun: '2026-03-27T08:00:00Z', description: 'Personal performance coach' },
        { id: '2', name: 'Sergeant First Class', icon: '🎖️', version: 'v2.1', status: 'active', nextSchedule: '2026-03-31T10:00:00Z', lastRun: '2026-03-26T10:00:00Z', description: 'Executive analytics' },
        { id: '3', name: 'Cami Agent (Weekly)', icon: '📅', version: 'v1.0', status: 'active', nextSchedule: '2026-04-05T18:00:00Z', lastRun: '2026-03-22T18:00:00Z', description: 'Weekly calendar briefing' },
        { id: '4', name: 'Cami Agent (Daily)', icon: '📅', version: 'v1.0', status: 'active', nextSchedule: '2026-03-30T18:00:00Z', lastRun: '2026-03-29T08:00:00Z', description: 'Daily calendar monitoring' },
        { id: '5', name: 'Research Scout', icon: '🔍', version: 'Daily', status: 'active', nextSchedule: '2026-03-29T16:00:00Z', lastRun: '2026-03-29T13:00:00Z', description: 'Web research and intelligence' },
        { id: '6', name: 'Bouncer Agent', icon: '🚪', version: 'Daily', status: 'active', nextSchedule: '2026-03-30T01:00:00Z', lastRun: '2026-03-29T01:00:00Z', description: 'Security audit' },
        { id: '7', name: 'Job Application Agent', icon: '💼', version: 'v2.0', status: 'idle', nextSchedule: '', lastRun: '2026-03-20T14:30:00Z', description: 'Job applications' }
      ];
    }

    function getMockCronJobs() {
      return [
        { id: '1', name: 'Cami Daily Briefing', icon: '📅', schedule: 'Daily (Mon-Sat) 18:00', nextRun: '2026-03-30T13:24:50Z', lastRun: '2026-03-29T12:24:50Z', duration: '19.2s', status: 'success' },
        { id: '2', name: 'Research Scout Hunt #1', icon: '🔍', schedule: 'Daily 08:00', nextRun: '2026-03-30T13:24:50Z', lastRun: '2026-03-29T12:24:50Z', duration: '27.7s', status: 'success' },
        { id: '3', name: 'Research Scout Hunt #2', icon: '🔍', schedule: 'Daily 16:00', nextRun: '2026-03-30T13:24:50Z', lastRun: '2026-03-29T13:24:50Z', duration: '11.4s', status: 'success' },
        { id: '4', name: 'Research Scout Hunt #3', icon: '🔍', schedule: 'Daily 00:00', nextRun: '2026-03-30T13:24:50Z', lastRun: '2026-03-29T13:24:50Z', duration: '9.3s', status: 'success' },
        { id: '5', name: 'Bouncer Security Audit', icon: '🚪', schedule: 'Daily 01:00', nextRun: '2026-03-30T13:24:50Z', lastRun: '2026-03-29T13:24:50Z', duration: '34.7s', status: 'success' },
        { id: '6', name: 'Consolidate Memory', icon: '🧠', schedule: 'Daily 22:00', nextRun: '2026-03-30T13:24:50Z', lastRun: '2026-03-29T12:24:50Z', duration: '6.0s', status: 'success' },
        { id: '7', name: 'Healthcheck Security Audit', icon: '⚠️', schedule: 'Daily 02:00', nextRun: '2026-03-30T13:24:50Z', lastRun: '2026-03-29T12:24:50Z', duration: '12.4s', status: 'error' },
        { id: '8', name: 'Cami Weekly Briefing', icon: '📅', schedule: 'Sunday 18:00', nextRun: '2026-04-05T20:00:00Z', lastRun: '2026-03-22T19:00:09Z', duration: '16.9s', status: 'success' }
      ];
    }

    function getMockCalendars() {
      return [
        { id: '1', name: 'FLCAL - Allgemein', description: 'General FleetLink scheduling', access: 'Writer' },
        { id: '2', name: 'FLCAL - MO / Externe Termine', description: 'External/client meetings', access: 'Writer' },
        { id: '3', name: 'FLCAL - Vertriebstermine', description: 'Sales/business development', access: 'Writer' },
        { id: '4', name: 'dk.heinz@gmail.com', description: 'Personal calendar', access: 'Writer' },
        { id: '5', name: 'FLCAL - Urlaub / krank', description: 'Vacation/sick reference', access: 'Reader' },
        { id: '6', name: "Wife's iCloud", description: 'Family calendar (read-only)', access: 'Reader' }
      ];
    }

    function formatDate(isoString) {
      if (!isoString) return 'N/A';
      const date = new Date(isoString);
      return date.toLocaleString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function showDashboard() {
      const agentTabContent = `<table><thead><tr><th>Agent</th><th>Version</th><th>Status</th><th>Next Run</th><th>Last Run</th></tr></thead><tbody>${agents.map(a => `<tr><td>${a.icon} ${a.name}</td><td>${a.version}</td><td><span class="status-badge status-${a.status}">${a.status}</span></td><td>${formatDate(a.nextSchedule)}</td><td>${formatDate(a.lastRun)}</td></tr>`).join('')}</tbody></table>`;
      
      const cronTabContent = `<table><thead><tr><th>Job</th><th>Schedule</th><th>Next Run</th><th>Last Run</th><th>Duration</th><th>Status</th></tr></thead><tbody>${cronJobs.map(j => `<tr><td>${j.icon} ${j.name}</td><td>${j.schedule}</td><td>${formatDate(j.nextRun)}</td><td>${formatDate(j.lastRun)}</td><td>${j.duration}</td><td><span class="status-badge status-${j.status}">${j.status}</span></td></tr>`).join('')}</tbody></table>`;
      
      const calendarTabContent = `<div class="calendar-grid">${calendars.map(c => `<div class="calendar-card"><div class="calendar-name">${c.name}</div><div class="calendar-desc">${c.description}</div><div class="calendar-access access-${c.access.toLowerCase()}">${c.access}</div></div>`).join('')}</div>`;
      
      document.getElementById('main').innerHTML = `
        <div class="tabs">
          <button class="tab-btn ${activeTab === 'agents' ? 'active' : ''}" onclick="switchTab('agents')">⚡ Agents</button>
          <button class="tab-btn ${activeTab === 'crons' ? 'active' : ''}" onclick="switchTab('crons')">🕐 Scheduled Jobs</button>
          <button class="tab-btn ${activeTab === 'calendars' ? 'active' : ''}" onclick="switchTab('calendars')">📅 Calendars</button>
        </div>
        
        ${activeTab === 'agents' ? agentTabContent : ''}
        ${activeTab === 'crons' ? cronTabContent : ''}
        ${activeTab === 'calendars' ? calendarTabContent : ''}
        
        <div class="last-updated">Last updated: ${lastUpdated}</div>
      `;
    }

    function showLogin() {
      document.getElementById('main').innerHTML = `
        <div style="max-width: 400px; margin: 50px auto; text-align: center;">
          <h2 style="color: #2196f3; margin-bottom: 20px;">Dashboard Login</h2>
          <form onsubmit="handleLogin(event)" style="display: flex; flex-direction: column; gap: 10px;">
            <input 
              type="password" 
              id="passwordInput" 
              placeholder="Enter password" 
              required 
              style="padding: 10px; background: rgba(20, 20, 30, 0.8); border: 1px solid #333; border-radius: 4px; color: #e0e0e0; font-family: 'Inter', sans-serif;"
            >
            <button 
              type="submit" 
              style="padding: 10px; background: #2196f3; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: 600; transition: all 0.2s;"
            >
              Log In
            </button>
          </form>
          <div id="loginError" style="display: none; color: #f44336; margin-top: 10px;"></div>
        </div>
      `;
    }

    function handleLogin(e) {
      e.preventDefault();
      const password = document.getElementById('passwordInput').value;
      if (password === 'admin') {
        isLoggedIn = true;
        localStorage.setItem('dashboardLoggedIn', 'true');
        fetchDataFromWebhook();
        setInterval(() => {
          if (isLoggedIn) fetchDataFromWebhook();
        }, 5000);
      } else {
        document.getElementById('loginError').textContent = 'Invalid credentials';
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function handleLogout() {
      isLoggedIn = false;
      localStorage.removeItem('dashboardLoggedIn');
      showLogin();
    }

    if (localStorage.getItem('dashboardLoggedIn')) {
      isLoggedIn = true;
      fetchDataFromWebhook();
      setInterval(() => {
        if (isLoggedIn) fetchDataFromWebhook();
      }, 5000);
    } else {
      showLogin();
    }
  </script>
</body>
</html>
