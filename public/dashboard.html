<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Dashboard v1.0.16</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #e0e0e0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 30px; }
    h1 { color: #2196f3; font-size: 2.5em; margin-bottom: 10px; }
    .subtitle { color: #90caf9; font-size: 1.1em; margin-bottom: 20px; }
    .refresh-btn { padding: 10px 20px; background: #2196f3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; margin: 20px 0; }
    .refresh-btn:hover { background: #1976d2; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { padding: 15px; border-radius: 4px; margin-bottom: 20px; text-align: center; font-weight: 600; }
    .status.success { background: rgba(76, 175, 80, 0.1); color: #4caf50; border: 1px solid #4caf50; }
    .status.error { background: rgba(244, 67, 54, 0.1); color: #f44336; border: 1px solid #f44336; }
    .status.info { background: rgba(33, 150, 243, 0.1); color: #2196f3; border: 1px solid #2196f3; }
    .status.warning { background: rgba(255, 193, 7, 0.1); color: #ffc107; border: 1px solid #ffc107; }
    table { width: 100%; border-collapse: collapse; background: rgba(20, 20, 30, 0.8); border: 1px solid #333; border-radius: 4px; margin: 20px 0; }
    th { padding: 12px; text-align: left; color: #2196f3; font-weight: 600; border-bottom: 2px solid #333; background: rgba(33, 150, 243, 0.1); }
    td { padding: 10px 12px; border-bottom: 1px solid #333; }
    tr:hover { background: rgba(33, 150, 243, 0.05); }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: 600; }
    .badge-active { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .badge-idle { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; }
    .login { max-width: 300px; margin: 100px auto; padding: 40px; background: rgba(20, 20, 30, 0.9); border: 1px solid #333; border-radius: 8px; text-align: center; }
    .login h2 { color: #2196f3; margin-bottom: 20px; }
    .login input { width: 100%; padding: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid #333; border-radius: 4px; color: white; }
    .login button { width: 100%; padding: 10px; background: #2196f3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    .login button:hover { background: #1976d2; }
    .info-box { padding: 15px; background: rgba(33, 150, 243, 0.1); border: 1px solid #2196f3; border-radius: 4px; margin-bottom: 20px; color: #90caf9; }
    .info-box strong { color: #2196f3; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 Dashboard v1.0.16</h1>
      <p class="subtitle">Google Sheets Real-Time Data</p>
    </header>
    
    <div id="loginContainer" class="login" style="display: none;">
      <h2>Login</h2>
      <form onsubmit="handleLogin(event)">
        <input type="password" id="passwordInput" placeholder="Password" required>
        <button type="submit">Sign In</button>
      </form>
      <div id="loginError" style="color: #f44336; margin-top: 10px; display: none;"></div>
    </div>
    
    <div id="dashboardContainer" style="display: none;">
      <div class="info-box">
        <strong>📌 How it works:</strong><br>
        1. Edit a cell in the Google Sheet → data is pushed automatically<br>
        2. Click <strong>Refresh Data</strong> to fetch the latest data here
      </div>
      
      <button class="refresh-btn" onclick="refreshData()">🔄 Refresh Data</button>
      <div id="status"></div>
      <div id="content"></div>
    </div>
  </div>

  <script>
    const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1d6Gcs88kOPqbOqyNtBLVrStWbDiLOjXc_0TcYI5qsm7xE4wUugr8Jl0TvN7bqTkeSw/exec';
    const SHEETS_API_URL = '/api/sheets';
    
    let isLoggedIn = false;
    let lastData = null;
    
    function showStatus(message, type) {
      const statusEl = document.getElementById('status');
      statusEl.innerHTML = `<div class="status ${type}">${message}</div>`;
    }
    
    async function refreshData() {
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = '🔄 Loading...';
      
      try {
        showStatus('⏳ Step 1: Calling Google Apps Script...', 'info');
        console.log('[REFRESH] Step 1: Calling Google Apps Script doPost...');
        
        // Call the Google Apps Script web app (this triggers doPost → sendAllDataNow)
        const scriptResponse = await fetch(GOOGLE_APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          mode: 'no-cors'  // Important: Apps Script requires no-cors
        });
        
        showStatus('⏳ Step 2: Waiting for data to be posted...', 'info');
        console.log('[REFRESH] Step 2: Waiting for Google Apps Script to POST data...');
        
        // Wait for the data to be posted (2 seconds should be enough)
        await new Promise(resolve => setTimeout(resolve, 2500));
        
        // Step 3: Fetch the data from the sheets API
        showStatus('⏳ Step 3: Fetching data from /api/sheets...', 'info');
        console.log('[REFRESH] Step 3: Fetching from /api/sheets...');
        
        const sheetsResponse = await fetch(SHEETS_API_URL);
        
        if (!sheetsResponse.ok) {
          throw new Error(`HTTP ${sheetsResponse.status}`);
        }
        
        const data = await sheetsResponse.json();
        console.log('[REFRESH] Data received:', data);
        
        if (data.success && data.data) {
          lastData = data;
          showStatus('✅ Data refreshed successfully!', 'success');
          displayData(data);
        } else {
          showStatus('⚠️ No data available. Edit a cell in Google Sheet first to push data.', 'warning');
          displayEmptyState();
        }
      } catch (error) {
        console.error('[REFRESH] Error:', error);
        showStatus(`❌ Error: ${error.message}`, 'error');
        displayEmptyState();
      } finally {
        btn.disabled = false;
        btn.textContent = '🔄 Refresh Data';
      }
    }
    
    function displayEmptyState() {
      const content = document.getElementById('content');
      content.innerHTML = '<p style="color: #666; text-align: center; padding: 40px;">📌 No data yet. Edit a cell in your Google Sheet to push data, then click Refresh.</p>';
    }
    
    function displayData(data) {
      const content = document.getElementById('content');
      const timestamp = new Date(data.timestamp).toLocaleString('en-US', { 
        year: 'numeric', 
        month: '2-digit', 
        day: '2-digit', 
        hour: '2-digit', 
        minute: '2-digit', 
        second: '2-digit',
        timeZone: 'Europe/Berlin'
      });
      
      const agents = data.data.agents || [];
      const jobs = data.data.jobs || [];
      
      let html = `<p style="color: #999; margin-bottom: 20px; font-size: 0.9em;">📅 Last updated: ${timestamp}</p>`;
      
      if (agents.length > 1) {
        html += '<h2 style="margin-top: 30px; color: #2196f3;">⚡ Agents</h2>';
        html += '<table><thead><tr><th>Name</th><th>Version</th><th>Status</th><th>Last Run</th></tr></thead><tbody>';
        for (let i = 1; i < agents.length; i++) {
          const row = agents[i];
          const statusClass = row[4]?.toLowerCase().includes('active') ? 'badge-active' : 'badge-idle';
          html += `<tr>
            <td>${row[2] || ''} ${row[1] || ''}</td>
            <td>${row[3] || 'N/A'}</td>
            <td><span class="badge ${statusClass}">${row[4] || 'unknown'}</span></td>
            <td>${row[6] || 'N/A'}</td>
          </tr>`;
        }
        html += '</tbody></table>';
      }
      
      if (jobs.length > 1) {
        html += '<h2 style="margin-top: 30px; color: #2196f3;">⏰ Cron Jobs</h2>';
        html += '<table><thead><tr><th>Name</th><th>Schedule</th><th>Next Run</th><th>Status</th></tr></thead><tbody>';
        for (let i = 1; i < jobs.length; i++) {
          const row = jobs[i];
          html += `<tr>
            <td>${row[2] || ''} ${row[1] || ''}</td>
            <td>${row[3] || 'N/A'}</td>
            <td>${row[4] || 'N/A'}</td>
            <td><span class="badge">${row[7] || 'unknown'}</span></td>
          </tr>`;
        }
        html += '</tbody></table>';
      }
      
      if (agents.length <= 1 && jobs.length <= 1) {
        html += '<p style="color: #666; text-align: center; padding: 40px;">No data in the sheets yet.</p>';
      }
      
      content.innerHTML = html;
    }
    
    function handleLogin(e) {
      e.preventDefault();
      const password = document.getElementById('passwordInput').value;
      
      if (password === 'admin') {
        isLoggedIn = true;
        localStorage.setItem('dashboardLoggedIn', 'true');
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('dashboardContainer').style.display = 'block';
        
        // Show empty state - DO NOT auto-refresh
        displayEmptyState();
        showStatus('📌 Click "Refresh Data" to load the latest data from Google Sheets', 'info');
      } else {
        const errorEl = document.getElementById('loginError');
        errorEl.textContent = '❌ Invalid password';
        errorEl.style.display = 'block';
      }
    }
    
    // Check if already logged in
    if (localStorage.getItem('dashboardLoggedIn')) {
      isLoggedIn = true;
      document.getElementById('dashboardContainer').style.display = 'block';
      document.getElementById('loginContainer').style.display = 'none';
      
      // Show empty state - DO NOT auto-refresh
      displayEmptyState();
      showStatus('📌 Click "Refresh Data" to load the latest data from Google Sheets', 'info');
    } else {
      document.getElementById('loginContainer').style.display = 'block';
      document.getElementById('dashboardContainer').style.display = 'none';
      document.getElementById('passwordInput').focus();
    }
  </script>
</body>
</html>
