<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Command Center v1.0</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a0a0a;
      background-image: 
        radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(63, 94, 251, 0.05) 0%, transparent 50%);
      color: #d1d5db;
    }

    .glass-panel {
      background: rgba(20, 20, 25, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .status-pulse {
      animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
    }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
      70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
      100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }

    .mono { font-family: 'JetBrains Mono', monospace; }

    html, body {
      height: 100%;
      width: 100%;
    }

    input:focus {
      border-color: #3b82f6;
    }

    button:hover {
      opacity: 0.9;
    }

    button:active {
      transform: scale(0.98);
    }

    .agent-row:hover {
      background-color: rgba(255, 255, 255, 0.05);
      cursor: pointer;
    }

    .hidden { display: none; }
    .loading { opacity: 0.6; }
  </style>
</head>
<body class="bg-black text-gray-300">
  <div id="app"></div>

  <script>
    let isLoggedIn = false;
    let agents = [];
    let cronJobs = [];

    async function fetchData() {
      try {
        const [agentsRes, cronRes] = await Promise.all([
          fetch('/api/agents-real'),
          fetch('/api/cron-jobs')
        ]);

        if (agentsRes.ok) {
          const data = await agentsRes.json();
          agents = data.agents || [];
        }
        if (cronRes.ok) {
          const data = await cronRes.json();
          cronJobs = data.cron_jobs || [];
        }

        if (isLoggedIn) {
          showDashboard();
        }
      } catch (error) {
        console.error('Failed to fetch data:', error);
      }
    }

    function formatTime(isoString) {
      const date = new Date(isoString);
      return date.toLocaleString('en-US', {
        month: 'short',
        day: 'numeric',
        year: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
    }

    function formatRelativeTime(isoString) {
      const date = new Date(isoString);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);

      if (diffMins < 1) return 'just now';
      if (diffMins < 60) return `${diffMins}m ago`;
      if (diffHours < 24) return `${diffHours}h ago`;
      return `${diffDays}d ago`;
    }

    function getStatusColor(status) {
      switch(status) {
        case 'running': return { bg: 'rgba(34, 197, 94, 0.1)', text: '#4ade80', dot: '#22c55e' };
        case 'scheduled': return { bg: 'rgba(59, 130, 246, 0.1)', text: '#60a5fa', dot: '#3b82f6' };
        case 'idle': return { bg: 'rgba(107, 114, 128, 0.1)', text: '#9ca3af', dot: '#6b7280' };
        case 'error': return { bg: 'rgba(239, 68, 68, 0.1)', text: '#f87171', dot: '#ef4444' };
        default: return { bg: 'rgba(107, 114, 128, 0.1)', text: '#9ca3af', dot: '#6b7280' };
      }
    }

    function showLogin() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div style="
          position: fixed;
          inset: 0;
          z-index: 50;
          display: flex;
          align-items: center;
          justify-content: center;
          background-color: rgba(0, 0, 0, 0.9);
          backdrop-filter: blur(4px);
        ">
          <div class="glass-panel" style="
            border-radius: 1rem;
            padding: 2rem;
            width: 100%;
            max-width: 28rem;
            border-color: #1f2937;
          ">
            <div style="
              display: flex;
              align-items: center;
              justify-content: center;
              margin-bottom: 1.5rem;
            ">
              <div style="
                width: 3rem;
                height: 3rem;
                background: linear-gradient(135deg, #2563eb 0%, #9333ea 100%);
                border-radius: 0.75rem;
                display: flex;
                align-items: center;
                justify-content: center;
              ">
                <svg class="w-6 h-6" style="color: white;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
              </div>
            </div>

            <h1 style="
              font-size: 1.875rem;
              font-weight: bold;
              color: white;
              text-align: center;
              margin-bottom: 0.5rem;
            ">Agent Command Center</h1>

            <p style="
              font-size: 0.875rem;
              color: #9ca3af;
              text-align: center;
              margin-bottom: 1.5rem;
            ">v1.0 • Secure Access Required</p>

            <form onsubmit="handleLogin(event)" style="display: flex; flex-direction: column; gap: 1rem;">
              <div>
                <label style="
                  display: block;
                  font-size: 0.75rem;
                  font-weight: 500;
                  color: #9ca3af;
                  text-transform: uppercase;
                  letter-spacing: 0.05em;
                  margin-bottom: 0.5rem;
                ">Password</label>
                <input 
                  type="password" 
                  id="passwordInput"
                  style="
                    width: 100%;
                    background-color: rgba(0, 0, 0, 0.5);
                    border: 1px solid #374151;
                    border-radius: 0.5rem;
                    padding: 0.75rem 1rem;
                    color: white;
                    font-size: 1rem;
                    font-family: inherit;
                    outline: none;
                    transition: border-color 0.2s;
                  "
                  placeholder="••••••••"
                />
              </div>
              <button type="submit" style="
                width: 100%;
                background-color: #2563eb;
                color: white;
                font-weight: 500;
                padding: 0.75rem 1rem;
                border-radius: 0.5rem;
                border: none;
                cursor: pointer;
                transition: all 0.2s;
                font-size: 1rem;
              ">
                Access Dashboard
              </button>
            </form>
            <p id="loginError" style="color: #ef4444; font-size: 0.875rem; text-align: center; margin-top: 1rem; display: none;"></p>
          </div>
        </div>
      `;
    }

    function showDashboard() {
      const app = document.getElementById('app');
      const agentRows = agents.map(agent => {
        const colors = getStatusColor(agent.status);
        return `
          <tr style="border-bottom: 1px solid #1f2937; cursor: pointer;" onmouseover="this.style.backgroundColor='rgba(255, 255, 255, 0.05)';" onmouseout="this.style.backgroundColor='transparent';">
            <td style="padding: 1rem 1.5rem; color: white; font-weight: 500;">${agent.name}</td>
            <td style="padding: 1rem 1.5rem;">
              <span style="
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.25rem 0.75rem;
                border-radius: 9999px;
                background-color: ${colors.bg};
                color: ${colors.text};
                border: 1px solid ${colors.bg};
                font-size: 0.75rem;
                font-weight: 500;
              ">
                <span style="width: 1.5px; height: 1.5px; background-color: ${colors.dot}; border-radius: 9999px; ${agent.status === 'running' ? 'animation: pulse-ring 2s infinite;' : ''}"></span>
                ${agent.status.charAt(0).toUpperCase() + agent.status.slice(1)}
              </span>
            </td>
            <td style="padding: 1rem 1.5rem; color: #9ca3af;">${agent.current_job || '—'}</td>
            <td style="padding: 1rem 1.5rem; color: #9ca3af; font-family: 'JetBrains Mono', monospace; font-size: 0.875rem;">${formatRelativeTime(agent.last_heartbeat)}</td>
          </tr>
        `;
      }).join('');

      const cronRows = cronJobs.map(job => {
        const lastExec = job.execution_history[0];
        return `
          <tr style="border-bottom: 1px solid #1f2937;">
            <td style="padding: 1rem 1.5rem; color: white; font-weight: 500;">${job.name}</td>
            <td style="padding: 1rem 1.5rem; color: #9ca3af; font-family: 'JetBrains Mono', monospace; font-size: 0.875rem;">
              <span style="display: inline-block; padding: 0.25rem 0.5rem; background: rgba(59, 130, 246, 0.1); border-radius: 0.25rem; color: #60a5fa;">${job.schedule}</span>
            </td>
            <td style="padding: 1rem 1.5rem; color: #9ca3af; font-size: 0.875rem;">${formatTime(job.next_execution)}</td>
            <td style="padding: 1rem 1.5rem; color: #9ca3af; font-size: 0.875rem;">${lastExec ? formatTime(lastExec.executed_at) : '—'}</td>
            <td style="padding: 1rem 1.5rem;">
              <span style="
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.25rem 0.75rem;
                border-radius: 9999px;
                background-color: ${lastExec?.status === 'success' ? 'rgba(34, 197, 94, 0.1)' : 'rgba(239, 68, 68, 0.1)'};
                color: ${lastExec?.status === 'success' ? '#4ade80' : '#f87171'};
                border: 1px solid ${lastExec?.status === 'success' ? 'rgba(34, 197, 94, 0.2)' : 'rgba(239, 68, 68, 0.2)'};
                font-size: 0.75rem;
              ">
                ${lastExec?.status === 'success' ? '✓' : '✗'} ${lastExec?.status || 'pending'}
              </span>
            </td>
            <td style="padding: 1rem 1.5rem; color: #9ca3af; font-size: 0.875rem; text-align: right;">${lastExec?.duration_ms ? (lastExec.duration_ms / 1000).toFixed(1) + 's' : '—'}</td>
          </tr>
        `;
      }).join('');

      app.innerHTML = `
        <div style="
          color: #d1d5db;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          background-color: #0a0a0a;
          background-image: radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.08) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(63, 94, 251, 0.05) 0%, transparent 50%);
          font-family: 'Inter', sans-serif;
        ">
          <header class="glass-panel" style="border-bottom: 1px solid #1f2937; position: sticky; top: 0; z-index: 40;">
            <div style="max-width: 1200px; margin-left: auto; margin-right: auto; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between;">
              <div style="display: flex; align-items: center; gap: 1rem;">
                <div style="width: 2.5rem; height: 2.5rem; background: linear-gradient(135deg, #2563eb 0%, #9333ea 100%); border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.2);">
                  <svg class="w-5 h-5" style="color: white;" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" /></svg>
                </div>
                <div>
                  <h1 style="font-size: 1.125rem; font-weight: bold; color: white; letter-spacing: -0.025em;">Agent Command Center</h1>
                  <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: #6b7280;">
                    <span class="status-pulse" style="width: 0.5rem; height: 0.5rem; background-color: #22c55e; border-radius: 9999px;"></span>
                    <span>System Online • v1.0.0</span>
                  </div>
                </div>
              </div>
              <button onclick="handleLogout()" style="padding: 0.5rem; background-color: transparent; border: none; border-radius: 0.5rem; cursor: pointer; color: #9ca3af; transition: all 0.2s;" onmouseover="this.style.backgroundColor='rgba(255, 255, 255, 0.05)'; this.style.color='white';" onmouseout="this.style.backgroundColor='transparent'; this.style.color='#9ca3af';">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
              </button>
            </div>
          </header>
          <main style="flex: 1; max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; width: 100%;">
            
            <section class="glass-panel" style="border-radius: 0.75rem; overflow: hidden; margin-bottom: 2rem;">
              <div style="padding: 1rem 1.5rem; border-bottom: 1px solid #1f2937; display: flex; align-items: center; justify-content: space-between; background-color: rgba(255, 255, 255, 0.05);">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                  <svg class="w-5 h-5" style="color: #60a5fa;" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                  <h2 style="font-size: 1.125rem; font-weight: 600; color: white;">Agents & Status</h2>
                  <span style="padding: 0.25rem 0.5rem; background-color: rgba(59, 130, 246, 0.1); color: #60a5fa; font-size: 0.75rem; border-radius: 9999px; border: 1px solid rgba(59, 130, 246, 0.2);">${agents.length} Total</span>
                </div>
                <button onclick="fetchData()" style="display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background-color: rgba(255, 255, 255, 0.05); border: 1px solid #374151; border-radius: 0.5rem; font-size: 0.875rem; cursor: pointer; color: white; transition: all 0.2s;" onmouseover="this.style.backgroundColor='rgba(255, 255, 255, 0.1)';" onmouseout="this.style.backgroundColor='rgba(255, 255, 255, 0.05)';">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                  <span>Refresh</span>
                </button>
              </div>
              <div style="overflow-x: auto;">
                <table style="width: 100%; text-align: left; border-collapse: collapse;">
                  <thead>
                    <tr style="font-size: 0.75rem; color: #6b7280; border-bottom: 1px solid #1f2937; background-color: rgba(0, 0, 0, 0.2);">
                      <th style="padding: 0.75rem 1.5rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">Agent Name</th>
                      <th style="padding: 0.75rem 1.5rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">Status</th>
                      <th style="padding: 0.75rem 1.5rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">Current Job</th>
                      <th style="padding: 0.75rem 1.5rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">Last Heartbeat</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${agentRows || '<tr><td style="padding: 2rem 1.5rem; color: #6b7280; text-align: center;">No agents found</td></tr>'}
                  </tbody>
                </table>
              </div>
            </section>

            <section class="glass-panel" style="border-radius: 0.75rem; overflow: hidden;">
              <div style="padding: 1rem 1.5rem; border-bottom: 1px solid #1f2937; display: flex; align-items: center; justify-content: space-between; background-color: rgba(255, 255, 255, 0.05);">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                  <svg class="w-5 h-5" style="color: #a78bfa;" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                  <h2 style="font-size: 1.125rem; font-weight: 600; color: white;">Cron Jobs & Executions</h2>
                  <span style="padding: 0.25rem 0.5rem; background-color: rgba(168, 85, 247, 0.1); color: #d8b4fe; font-size: 0.75rem; border-radius: 9999px; border: 1px solid rgba(168, 85, 247, 0.2);">${cronJobs.length} Scheduled</span>
                </div>
              </div>
              <div style="overflow-x: auto;">
                <table style="width: 100%; text-align: left; border-collapse: collapse;">
                  <thead>
                    <tr style="font-size: 0.75rem; color: #6b7280; border-bottom: 1px solid #1f2937; background-color: rgba(0, 0, 0, 0.2);">
                      <th style="padding: 0.75rem 1.5rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">Job Name</th>
                      <th style="padding: 0.75rem 1.5rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">Schedule</th>
                      <th style="padding: 0.75rem 1.5rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">Next Execution</th>
                      <th style="padding: 0.75rem 1.5rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">Last Executed</th>
                      <th style="padding: 0.75rem 1.5rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">Status</th>
                      <th style="padding: 0.75rem 1.5rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; text-align: right;">Duration</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${cronRows || '<tr><td style="padding: 2rem 1.5rem; color: #6b7280; text-align: center;">No cron jobs found</td></tr>'}
                  </tbody>
                </table>
              </div>
            </section>
          </main>
        </div>
      `;
    }

    function handleLogin(e) {
      e.preventDefault();
      const password = document.getElementById('passwordInput').value;
      
      if (password === 'admin') {
        isLoggedIn = true;
        localStorage.setItem('dashboardLoggedIn', 'true');
        fetchData();
      } else {
        document.getElementById('loginError').textContent = 'Invalid credentials';
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function handleLogout() {
      isLoggedIn = false;
      localStorage.removeItem('dashboardLoggedIn');
      showLogin();
    }

    if (localStorage.getItem('dashboardLoggedIn')) {
      isLoggedIn = true;
      fetchData();
    } else {
      showLogin();
    }

    setInterval(() => {
      if (isLoggedIn) {
        fetchData();
      }
    }, 30000);
  </script>
</body>
</html>
