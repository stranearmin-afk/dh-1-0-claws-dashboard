<!DOCTYPE html><html lang="en" class="dark"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Agent Command Center v1.0</title><link rel="icon" href="/favicon.svg" type="image/svg+xml"><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background-color:#0a0a0a;background-image:radial-gradient(circle at 20% 50%,rgba(120,119,198,0.08) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(63,94,251,0.05) 0%,transparent 50%);color:#d1d5db}.glass-panel{background:rgba(20,20,25,0.7);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);box-shadow:0 8px 32px 0 rgba(0,0,0,0.37)}.status-pulse{animation:pulse-ring 2s cubic-bezier(0.215,0.61,0.355,1) infinite}@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(34,197,94,0.7)}70%{box-shadow:0 0 0 6px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}html,body{height:100%;width:100%}input:focus{border-color:#3b82f6}button:hover{opacity:0.9}button:active{transform:scale(0.98)}.sort-btn{padding:0.35rem 0.7rem;font-size:0.7rem;font-weight:600;border-radius:0.25rem;border:1px solid #475569;background-color:rgba(255,255,255,0.02);color:#cbd5e1;cursor:pointer;transition:all 0.2s}.sort-btn.active{background-color:#3b82f6;color:white;border-color:#3b82f6}.sort-btn:hover{background-color:rgba(59,130,246,0.2)}.connection-badge{display:inline-flex;align-items:center;gap:0.5rem;padding:0.75rem 1rem;background-color:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:0.5rem;font-size:0.875rem;color:#4ade80;margin:0.5rem 0.5rem 0.5rem 0}.expandable-row{cursor:pointer}.expand-details{display:grid;grid-template-columns:1fr 1fr;gap:2rem;padding:1.5rem;background-color:rgba(0,0,0,0.3);border-top:1px solid #1f2937}.expand-section{display:flex;flex-direction:column;gap:0.75rem}.expand-section-title{font-weight:600;color:#60a5fa;font-size:0.875rem;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem}.spec-item{display:flex;justify-content:space-between;padding:0.5rem 0.75rem;background-color:rgba(255,255,255,0.05);border-radius:0.375rem;font-size:0.8rem}.spec-label{color:#6b7280;font-weight:500}.spec-value{color:#e5e7eb;font-family:'JetBrains Mono',monospace;text-align:right;word-break:break-all}.output-box{background-color:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);border-radius:0.375rem;padding:1rem;font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:#4ade80;max-height:300px;overflow-y:auto;white-space:pre-wrap;word-wrap:break-word;line-height:1.4}</style></head><body class="bg-black text-gray-300"><div id="app"></div><script>let isLoggedIn=false;let agents=[];let cronJobs=[];let tokenUsage=null;let connections=[];let agentSort='status';let cronSort='next';let expandedAgents=new Set();let expandedCrons=new Set();let activeTab=localStorage.getItem('dashboardTab')||'agents';let jobKindsFilter=[];let editingJobId=null;let editingJobKinds=[];const allJobKinds=['Admin','Research','Productivity','Work'];async function fetchData(){try{const[agentsRes,cronRes,tokenRes,connRes]=await Promise.all([fetch('/api/agents-real'),fetch('/api/cron-jobs'),fetch('/api/token-usage'),fetch('/api/connections')]);if(agentsRes.ok)agents=(await agentsRes.json()).agents||[];if(cronRes.ok)cronJobs=(await cronRes.json()).cron_jobs||[];if(tokenRes.ok)tokenUsage=await tokenRes.json();if(connRes.ok)connections=(await connRes.json()).connections||[];if(isLoggedIn)showDashboard();}catch(error){console.error('Failed to fetch data:',error);}}function getCurrentTimeZone(){const now=new Date();const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;const tzName=tz==='Europe/Berlin'?'CET/CEST':tz.split('/')[1]||tz;const berlinTime=new Date(now.toLocaleString('en-US',{timeZone:'Europe/Berlin'}));const utcTime=new Date(now.toLocaleString('en-US',{timeZone:'UTC'}));const offsetMs=berlinTime-utcTime;const offsetHours=Math.floor(Math.abs(offsetMs)/(1000*60*60));const offsetMins=Math.floor((Math.abs(offsetMs)%(1000*60*60))/(1000*60));const offsetSign=offsetMs>=0?'+':'-';const offset=`${offsetSign}${String(offsetHours).padStart(2,'0')}:${String(offsetMins).padStart(2,'0')}`;const hours=String(berlinTime.getHours()).padStart(2,'0');const minutes=String(berlinTime.getMinutes()).padStart(2,'0');return `${hours}:${minutes} ${tzName} (${offset})`;}function formatTimeGerman(isoString){const date=new Date(isoString);const day=String(date.getDate()).padStart(2,'0');const month=String(date.getMonth()+1).padStart(2,'0');const year=String(date.getFullYear()).slice(-2);const hours=String(date.getHours()).padStart(2,'0');const minutes=String(date.getMinutes()).padStart(2,'0');const seconds=String(date.getSeconds()).padStart(2,'0');return `${day}.${month}.${year} ${hours}:${minutes}:${seconds}`;}function formatRelativeTime(isoString){const date=new Date(isoString);const now=new Date();const diffMs=now-date;const diffMins=Math.floor(diffMs/60000);const diffHours=Math.floor(diffMs/3600000);const diffDays=Math.floor(diffMs/86400000);if(diffMins<1)return'just now';if(diffMins<60)return `${diffMins}m ago`;if(diffHours<24)return `${diffHours}h ago`;return `${diffDays}d ago`;}function getStatusColor(status){const colors={'running':{bg:'rgba(34,197,94,0.1)',text:'#4ade80',dot:'#22c55e'},'scheduled':{bg:'rgba(59,130,246,0.1)',text:'#60a5fa',dot:'#3b82f6'},'idle':{bg:'rgba(107,114,128,0.1)',text:'#9ca3af',dot:'#6b7280'},'error':{bg:'rgba(239,68,68,0.1)',text:'#f87171',dot:'#ef4444'}};return colors[status]||colors['idle'];}function sortAgents(){if(agentSort==='status'){return[...agents].sort((a,b)=>{const statusOrder={'running':0,'scheduled':1,'idle':2,'error':3};return(statusOrder[a.status]||4)-(statusOrder[b.status]||4);});}else if(agentSort==='name'){return[...agents].sort((a,b)=>a.name.localeCompare(b.name));}else if(agentSort==='heartbeat'){return[...agents].sort((a,b)=>new Date(b.last_heartbeat)-new Date(a.last_heartbeat));}return agents;}function sortCrons(){if(cronSort==='next'){return[...cronJobs].sort((a,b)=>new Date(a.next_execution)-new Date(b.next_execution));}else if(cronSort==='name'){return[...cronJobs].sort((a,b)=>a.name.localeCompare(b.name));}else if(cronSort==='status'){return[...cronJobs].sort((a,b)=>{const aStatus=a.execution_history[0]?.status||'pending';const bStatus=b.execution_history[0]?.status||'pending';return aStatus==='success'?-1:1;});}return cronJobs;}function toggleAgent(agentId){if(expandedAgents.has(agentId)){expandedAgents.delete(agentId);}else{expandedAgents.add(agentId);}showDashboard();}function toggleCron(cronId){if(expandedCrons.has(cronId)){expandedCrons.delete(cronId);}else{expandedCrons.add(cronId);}showDashboard();}function switchTab(tab){activeTab=tab;localStorage.setItem('dashboardTab',tab);showDashboard();}function toggleJobKindFilter(kind){const idx=jobKindsFilter.indexOf(kind);if(idx>-1){jobKindsFilter.splice(idx,1);}else{jobKindsFilter.push(kind);}showDashboard();}function getFilteredCrons(){if(jobKindsFilter.length===0)return sortCrons();return sortCrons().filter(job=>{const jobKinds=job.kinds||[];return jobKinds.some(k=>jobKindsFilter.includes(k));});}function openEditKinds(jobId,currentKinds,event){event.stopPropagation();editingJobId=jobId;editingJobKinds=[...currentKinds];showDashboard();}function closeEditKinds(){editingJobId=null;editingJobKinds=[];showDashboard();}function toggleKindInEdit(kind){const idx=editingJobKinds.indexOf(kind);if(idx>-1){editingJobKinds.splice(idx,1);}else{editingJobKinds.push(kind);}}async function saveJobKinds(){if(!editingJobId)return;try{const response=await fetch('/api/cron-jobs/update-kinds',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({job_id:editingJobId,kinds:editingJobKinds})});if(response.ok){const updatedJob=cronJobs.find(j=>j.id===editingJobId);if(updatedJob){updatedJob.kinds=editingJobKinds;}closeEditKinds();showDashboard();alert('✓ Job kinds updated');}else{alert('✕ Failed to update job kinds');}}catch(error){console.error('Failed to save job kinds:',error);alert('✕ Error updating job kinds');}}async function runCronJob(jobId,jobName,event){event.stopPropagation();try{const response=await fetch('/api/cron-jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({job_id:jobId})});if(response.ok){const data=await response.json();const executedTime=new Date(data.executed_at||new Date()).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});const successMsg=`✓ Job triggered at ${executedTime}`;alert(successMsg);setTimeout(fetchData,2000);}else{alert('✕ Error running job');}}catch(error){console.error('Failed to run job:',error);alert('✕ Error running job');}}function getUsageBar(){if(!tokenUsage)return'';const usage=tokenUsage.account_balance;const percent=Math.min(parseFloat(usage.usage_percent),100);const color=percent>75?'#ef4444':percent>50?'#f59e0b':'#10b981';return `<div style=\"width: 100%; height: 4px; background-color: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden;\"><div style=\"width: ${percent}%; height: 100%; background-color: ${color}; transition: width 0.3s;\"></div></div>`;}function showLogin(){const app=document.getElementById('app');app.innerHTML=`<div style=\"position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background-color:rgba(0,0,0,0.95);backdrop-filter:blur(8px);\"><div class=\"glass-panel\" style=\"border-radius:1.25rem;padding:2.5rem;width:100%;max-width:32rem;border-color:#374151;box-shadow:0 25px 50px rgba(0,0,0,0.5);\"><h1 style=\"font-size:2rem;font-weight:800;color:white;text-align:center;margin-bottom:2rem;\">Agent Command Center</h1><form onsubmit=\"handleLogin(event)\" style=\"display:flex;flex-direction:column;gap:1.25rem;\"><div><label style=\"display:block;font-size:0.75rem;font-weight:600;color:#9ca3af;text-transform:uppercase;margin-bottom:0.75rem;\">🔐 Password</label><input type=\"password\" id=\"passwordInput\" autocomplete=\"off\" style=\"width:100%;background-color:rgba(0,0,0,0.6);border:1.5px solid #475569;border-radius:0.625rem;padding:0.875rem 1.125rem;color:white;font-size:1rem;outline:none;transition:all 0.3s;\" placeholder=\"Enter password\" onkeyup=\"if(event.key==='Enter')handleLogin(event);\"/></div><button type=\"submit\" style=\"width:100%;background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%);color:white;font-weight:600;padding:0.875rem 1rem;border-radius:0.625rem;border:none;cursor:pointer;font-size:1rem;text-transform:uppercase;\">Access Dashboard</button></form><p id=\"loginError\" style=\"color:#fca5a5;font-size:0.875rem;text-align:center;margin-top:1.25rem;display:none;font-weight:500;padding:0.75rem;background-color:rgba(239,68,68,0.1);border-radius:0.5rem;\"></p></div></div>`;setTimeout(()=>{const passInput=document.getElementById('passwordInput');if(passInput)passInput.focus();},100);}function buildAgentDetailsHtml(agent){return `<div class=\"expand-details\"><div style=\"padding:1rem;background:rgba(0,0,0,0.5);border-radius:0.5rem;\"><h4 style=\"color:#60a5fa;margin-top:0;\">Details</h4><pre style=\"color:#4ade80;font-size:0.75rem;overflow:auto;\">${JSON.stringify(agent,null,2)}</pre></div></div>`;}function buildCronDetailsHtml(job){return `<div class=\"expand-details\"><div style=\"padding:1rem;background:rgba(0,0,0,0.5);border-radius:0.5rem;\"><h4 style=\"color:#a78bfa;margin-top:0;\">Details</h4><pre style=\"color:#4ade80;font-size:0.75rem;overflow:auto;\">${JSON.stringify(job,null,2)}</pre></div></div>`;}function showDashboard(){const app=document.getElementById('app');const sortedAgents=sortAgents();const sortedCrons=sortCrons();const usageBar=getUsageBar();const connBadges=connections.map(c=>`<span style=\"display:inline-block;margin-right:1rem;\">${c.icon} ${c.name}</span>`).join('');const agentTable=sortedAgents.map(agent=>`<tr style=\"border-bottom:1px solid #1f2937;\"><td style=\"padding:1rem;\"><strong style=\"color:white;\">${agent.name}</strong><br/><span style=\"color:#6b7280;font-size:0.8rem;\">${agent.description}</span></td><td style=\"padding:1rem;color:${getStatusColor(agent.status).text};\">${agent.status}</td><td style=\"padding:1rem;color:#9ca3af;\">${agent.current_job||'—'}</td></tr>`).join('');const cronTable=sortedCrons.map(job=>`<tr style=\"border-bottom:1px solid #1f2937;\"><td style=\"padding:1rem;\"><strong style=\"color:white;\">${job.name}</strong><br/><span style=\"color:#6b7280;font-size:0.8rem;\">${job.description}</span></td><td style=\"padding:1rem;color:#9ca3af;\">${job.schedule_readable}</td><td style=\"padding:1rem;color:#9ca3af;\">${job.next_execution?formatTimeGerman(job.next_execution):'—'}</td><td style=\"padding:1rem;text-align:right;\"><button onclick=\"runCronJob('${job.id}','${job.name}',event)\" style=\"padding:0.5rem 1rem;background:#3b82f6;color:white;border:none;border-radius:0.375rem;cursor:pointer;\">Run</button></td></tr>`).join('');app.innerHTML=`<div style=\"color:#d1d5db;min-height:100vh;display:flex;flex-direction:column;background-color:#0a0a0a;font-family:'Inter',sans-serif;\"><header class=\"glass-panel\" style=\"border-bottom:1px solid #1f2937;padding:1.5rem;position:sticky;top:0;z-index:40;\"><div style=\"display:flex;align-items:center;justify-content:space-between;\"><div><h1 style=\"color:white;margin:0;font-size:1.5rem;\">Agent Command Center</h1><div style=\"color:#6b7280;font-size:0.85rem;margin-top:0.5rem;\">v1.0.2 • System Online</div></div><button onclick=\"handleLogout()\" style=\"padding:0.5rem 1rem;background:rgba(239,68,68,0.1);color:#fca5a5;border:1px solid #dc2626;border-radius:0.5rem;cursor:pointer;\">Sign Out</button></div></header><div style=\"background:rgba(0,0,0,0.4);border-bottom:1px solid #1f2937;padding:1rem;display:flex;gap:2rem;\"><button onclick=\"switchTab('agents')\" style=\"background:${activeTab==='agents'?'rgba(59,130,246,0.2)':'transparent'};color:${activeTab==='agents'?'#60a5fa':'#6b7280'};border:none;cursor:pointer;padding:0.5rem 1rem;font-weight:600;\">Active Agents</button><button onclick=\"switchTab('jobs')\" style=\"background:${activeTab==='jobs'?'rgba(168,85,247,0.2)':'transparent'};color:${activeTab==='jobs'?'#d8b4fe':'#6b7280'};border:none;cursor:pointer;padding:0.5rem 1rem;font-weight:600;\">Scheduled Jobs</button></div><main style=\"flex:1;padding:2rem;max-width:1400px;margin:0 auto;width:100%;\"><section class=\"glass-panel\" style=\"border-radius:0.75rem;overflow:hidden;\"><div style=\"padding:1.5rem;border-bottom:1px solid #1f2937;background:rgba(255,255,255,0.05);\"><h2 style=\"color:white;margin:0;font-size:1.25rem;\">${activeTab==='agents'?'Active Agents':'Scheduled Jobs'}</h2><p style=\"color:#6b7280;margin:0.5rem 0 0 0;font-size:0.875rem;\">${activeTab==='agents'?agents.length+' agents':''+cronJobs.length+' jobs'}</p></div><div style=\"overflow-x:auto;\"><table style=\"width:100%;text-align:left;border-collapse:collapse;\">${activeTab==='agents'?`<thead><tr style=\"font-size:0.75rem;color:#6b7280;border-bottom:1px solid #1f2937;background:rgba(0,0,0,0.2);\"><th style=\"padding:0.75rem 1rem;font-weight:600;text-transform:uppercase;\" >Agent Name</th><th style=\"padding:0.75rem 1rem;font-weight:600;text-transform:uppercase;\">Status</th><th style=\"padding:0.75rem 1rem;font-weight:600;text-transform:uppercase;\">Current Job</th></tr></thead><tbody>${agentTable||'<tr><td colspan=\"3\" style=\"padding:2rem;text-align:center;color:#6b7280;\">No agents available</td></tr>'}</tbody>`:` <thead><tr style=\"font-size:0.75rem;color:#6b7280;border-bottom:1px solid #1f2937;background:rgba(0,0,0,0.2);\"><th style=\"padding:0.75rem 1rem;font-weight:600;text-transform:uppercase;\">Job Name</th><th style=\"padding:0.75rem 1rem;font-weight:600;text-transform:uppercase;\">Schedule</th><th style=\"padding:0.75rem 1rem;font-weight:600;text-transform:uppercase;\">Next Execution</th><th style=\"padding:0.75rem 1rem;font-weight:600;text-transform:uppercase;text-align:right;\">Action</th></tr></thead><tbody>${cronTable||'<tr><td colspan=\"4\" style=\"padding:2rem;text-align:center;color:#6b7280;\">No jobs scheduled</td></tr>'}</tbody>`}</table></div></section></main></div>`;}function handleLogin(e){e.preventDefault();const password=document.getElementById('passwordInput').value;if(password==='admin'){isLoggedIn=true;localStorage.setItem('dashboardLoggedIn','true');fetchData();}else{const errorEl=document.getElementById('loginError');errorEl.textContent='✕ Invalid password';errorEl.style.display='block';}}function handleLogout(){isLoggedIn=false;localStorage.removeItem('dashboardLoggedIn');showLogin();}if(localStorage.getItem('dashboardLoggedIn')){isLoggedIn=true;fetchData();}else{showLogin();}setInterval(()=>{if(isLoggedIn)fetchData();},30000);</script></body></html>
