<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Agent Command Center v1.0</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,sans-serif;background:#0a0a0a;color:#d1d5db}#app{min-height:100vh;display:flex;align-items:center;justify-content:center;background-color:#0a0a0a}.login-container{background:rgba(20,20,25,0.7);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:40px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.37)}.login-container h1{font-size:32px;font-weight:700;color:white;text-align:center;margin-bottom:10px}.login-container p{color:#9ca3af;text-align:center;margin-bottom:30px;font-size:14px}.login-form{display:flex;flex-direction:column;gap:20px}.form-group label{display:block;font-size:12px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px}.form-group input{width:100%;background-color:rgba(0,0,0,0.6);border:1.5px solid #475569;border-radius:8px;padding:12px;color:white;font-size:16px;outline:none}.form-group input:focus{border-color:#3b82f6}.submit-btn{width:100%;background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%);color:white;font-weight:600;padding:12px;border-radius:8px;border:none;cursor:pointer;font-size:16px;text-transform:uppercase;letter-spacing:0.05em;box-shadow:0 10px 25px rgba(37,99,235,0.2);transition:all 0.3s}.submit-btn:hover{transform:translateY(-2px);box-shadow:0 15px 35px rgba(37,99,235,0.3)}.error-msg{color:#fca5a5;font-size:14px;text-align:center;padding:12px;background-color:rgba(239,68,68,0.1);border-radius:6px;border-left:3px solid #ef4444;display:none}</style></head><body><div id="app"><div class="login-container"><h1>Agent Command Center</h1><p>v1.0 • Secure Access • Real-Time Monitoring</p><form id="loginForm" class="login-form"><div class="form-group"><label>🔐 Password</label><input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off"></div><button type="submit" class="submit-btn">Access Dashboard</button></form><div id="errorMsg" class="error-msg"></div></div></div><script>document.getElementById('loginForm').addEventListener('submit',function(e){e.preventDefault();const pwd=document.getElementById('passwordInput').value;const err=document.getElementById('errorMsg');if(pwd==='admin'){localStorage.setItem('dashboardLoggedIn','true');alert('✓ Logged in! Redirecting...');setTimeout(()=>{location.reload()},300)}else{err.textContent='✕ Invalid password';err.style.display='block';document.getElementById('passwordInput').focus()}});if(localStorage.getItem('dashboardLoggedIn')){document.getElementById('app').innerHTML='<div style="color:white;text-align:center;padding:40px"><h1>Loading Dashboard...</h1><p>If this takes more than 5 seconds, there may be an API issue.</p></div>';setTimeout(()=>{location.href='/dashboard.html?reload=true'},1000)}</script></body></html>
